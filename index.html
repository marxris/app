<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>MarXris</title>
<style>
  :root {
    --bg: #f2f2f7;
    --bg-elev: #ffffff;
    --bg-soft: #e5e5ea;
    --bg-tert: #d1d1d6;
    --tint: #007aff;
    --tint-soft: rgba(0, 122, 255, 0.14);
    --green: #34c759;
    --red: #ff3b30;
    --orange: #ff9500;
    --blue: #007aff;
    --purple: #af52de;
    --pink: #f23388;
    --amber: #d99000;
    --gray: #8e8e93;
    --text: #000;
    --text-2: #6c6c70;
    --radius: 12px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bot: env(safe-area-inset-bottom, 0px);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #000;
      --bg-elev: #1c1c1e;
      --bg-soft: #2c2c2e;
      --bg-tert: #3a3a3c;
      --tint-soft: rgba(10, 132, 255, 0.22);
      --tint: #0a84ff;
      --text: #fff;
      --text-2: #98989d;
    }
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text);
    font: 16px -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
    -webkit-tap-highlight-color: transparent;
  }
  button { font: inherit; color: inherit; background: none; border: 0; padding: 0; cursor: pointer; }
  input, select, textarea { font: inherit; color: inherit; }
  #app { min-height: 100%; display: flex; flex-direction: column; }

  /* Nav */
  .nav {
    position: sticky; top: 0; z-index: 10;
    padding: calc(var(--safe-top) + 6px) 12px 6px;
    display: flex; align-items: center; gap: 8px;
    background: color-mix(in srgb, var(--bg) 92%, transparent);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
  }
  .nav-title { font-size: 17px; font-weight: 600; flex: 1; text-align: center; }
  .nav button { color: var(--tint); font-size: 16px; padding: 6px; min-width: 32px; }
  .nav button.icon { font-size: 22px; line-height: 1; }
  .nav .ghost { width: 32px; }

  .scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: calc(var(--safe-bot) + 24px); }
  .bottombar {
    padding: 8px 12px calc(10px + var(--safe-bot));
    background: color-mix(in srgb, var(--bg) 92%, transparent);
    backdrop-filter: saturate(180%) blur(20px);
    border-top: 1px solid var(--bg-soft);
    display: flex; align-items: center; justify-content: center;
  }
  .bottombar button { color: var(--tint); font-weight: 500; padding: 8px 14px; }

  /* Sign in */
  .signin {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 18px; padding: 24px; text-align: center;
  }
  .signin h1 { margin: 0; font-size: 34px; font-weight: 800; letter-spacing: -0.02em; }
  .signin p { color: var(--text-2); max-width: 28em; line-height: 1.4; }
  .primary {
    background: var(--tint); color: #fff; font-weight: 600;
    padding: 14px 22px; border-radius: 14px; min-width: 240px;
  }
  .help { font-size: 12px; color: var(--text-2); max-width: 32em; line-height: 1.5; }
  .help code { background: var(--bg-soft); padding: 1px 6px; border-radius: 4px; font-size: 11px; }
  .err { color: var(--red); font-size: 13px; padding: 6px 12px; }

  /* Main page */
  .main-welcome {
    font-size: 30px; font-weight: 800; letter-spacing: -0.02em; text-align: center; padding: 36px 16px 8px;
  }
  .main-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding: 16px;
  }
  .tile {
    border-radius: 16px; padding: 28px 12px;
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    cursor: pointer; transition: transform 0.08s;
  }
  .tile:active { transform: scale(0.98); }
  .tile-icon { font-size: 44px; line-height: 1; }
  .tile-name { font-weight: 600; font-size: 17px; }
  .tile.shopping { background: color-mix(in srgb, var(--blue) 14%, transparent); color: var(--blue); }
  .tile.expenses { background: color-mix(in srgb, var(--green) 14%, transparent); color: var(--green); }
  .tile.books    { background: color-mix(in srgb, var(--orange) 14%, transparent); color: var(--orange); }
  .tile.travel   { background: color-mix(in srgb, var(--purple) 14%, transparent); color: var(--purple); }

  /* Lists / sections */
  .group-list { padding: 12px; display: flex; flex-direction: column; gap: 16px; }
  .section-card { background: var(--bg-elev); border-radius: var(--radius); overflow: hidden; }
  .section-title { padding: 4px 16px; font-size: 13px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--text-2); display: flex; align-items: center; gap: 6px; }
  .row {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px; min-height: 44px;
    border-top: 1px solid var(--bg-soft);
  }
  .row:first-child { border-top: 0; }
  .row .grow { flex: 1; min-width: 0; }
  .row.tap { cursor: pointer; }
  .row.tap:active { background: var(--bg-soft); }
  .row .chev { color: var(--gray); font-size: 18px; }
  .muted { color: var(--text-2); font-size: 13px; }
  .empty {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 8px; color: var(--text-2); padding: 60px 24px; text-align: center;
  }
  .empty .e-icon { font-size: 48px; opacity: 0.5; }

  /* Shopping */
  .shop-emoji {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--bg-tert); display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex: 0 0 36px;
  }
  .item-row .check { width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--gray); display: flex; align-items: center; justify-content: center; flex: 0 0 28px; font-size: 14px; color: transparent; }
  .item-row .check.on { background: var(--green); border-color: var(--green); color: #fff; }
  .item-row .thumb { width: 36px; height: 36px; border-radius: 6px; background: var(--bg-tert); flex: 0 0 36px; background-size: cover; background-position: center; cursor: zoom-in; }
  .item-row { cursor: pointer; }
  .item-row .name { flex: 1; min-width: 0; }
  .icon-mini {
    width: 30px; height: 30px; border-radius: 50%;
    background: var(--bg-tert); color: var(--text-2);
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 14px;
  }
  .icon-mini:hover { background: color-mix(in srgb, var(--tint) 18%, transparent); color: var(--tint); }
  .item-row.checked .name { text-decoration: line-through; color: var(--text-2); }
  .item-row .qty { background: var(--bg-tert); color: var(--text-2); border-radius: 999px; padding: 3px 8px; font-size: 12px; font-weight: 500; }
  .addbar {
    position: sticky; bottom: 0;
    background: color-mix(in srgb, var(--bg) 92%, transparent);
    backdrop-filter: saturate(180%) blur(20px);
    padding: 8px 12px;
    display: flex; gap: 8px; align-items: center;
    border-top: 1px solid var(--bg-soft);
  }
  .addbar input.name { flex: 1; min-width: 0; padding: 10px 12px; border-radius: 10px; border: 1px solid var(--bg-tert); background: var(--bg-elev); }
  .addbar select { padding: 8px 8px; border-radius: 999px; background: var(--bg-tert); border: 0; max-width: 130px; }
  .addbar .plus { width: 36px; height: 36px; border-radius: 50%; color: var(--tint); font-size: 28px; }
  .addbar .plus[disabled] { color: var(--gray); }
  .suggestions { overflow-x: auto; display: flex; gap: 8px; padding: 8px 12px; border-top: 1px solid var(--bg-soft); background: var(--bg-elev); }
  .sugg-chip { flex: 0 0 auto; padding: 6px 12px; border-radius: 999px; background: var(--bg-soft); display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 500; }
  .sugg-chip .thumb { width: 22px; height: 22px; border-radius: 4px; background-size: cover; background-position: center; }
  .sugg-chip .q { color: var(--text-2); }
  .hist-filter-row { display: flex; gap: 8px; padding: 8px 12px; overflow-x: auto; background: var(--bg-elev); border-bottom: 1px solid var(--bg-soft); }
  .hist-chip { width: 40px; height: 40px; border-radius: 50%; background: var(--bg-soft); display: flex; align-items: center; justify-content: center; font-size: 20px; flex: 0 0 40px; }
  .hist-chip.on { background: var(--tint); color: #fff; }
  .hist-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 12px; }
  .hist-cell {
    padding: 10px; border-radius: 10px; display: flex; flex-direction: column; gap: 4px;
    cursor: pointer;
  }
  .hist-cell.available { background: var(--tint-soft); color: var(--tint); }
  .hist-cell.added { background: var(--bg-tert); color: var(--text-2); cursor: default; }
  .hist-cell .h-name { font-weight: 500; font-size: 14px; }
  .hist-cell .h-qty { font-size: 11px; color: var(--text-2); }
  .found-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 12px; }
  .found-cell {
    padding: 10px; border-radius: 10px;
    display: flex; flex-direction: column; gap: 4px; align-items: flex-start;
    background: color-mix(in srgb, var(--green) 14%, transparent);
    color: var(--text); text-align: left; cursor: pointer; font: inherit; border: 0;
  }
  .found-cell .h-name { font-weight: 500; font-size: 14px; color: var(--text); }
  .found-cell .h-qty { font-size: 11px; color: var(--text-2); }

  /* Books */
  .filter-row { display: flex; gap: 8px; padding: 8px 12px; overflow-x: auto; align-items: center; }
  .pill {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 12px; border-radius: 999px; font-size: 13px; font-weight: 500;
    border: 1.5px solid transparent;
  }
  .pill .count { padding: 1px 6px; border-radius: 999px; background: rgba(255,255,255,0.2); }
  .pill.toFind  { background: color-mix(in srgb, var(--amber) 12%, transparent);  color: var(--amber); }
  .pill.toRead  { background: color-mix(in srgb, var(--blue) 12%, transparent);   color: var(--blue); }
  .pill.read    { background: color-mix(in srgb, var(--green) 12%, transparent);  color: var(--green); }
  .pill.stopped { background: color-mix(in srgb, var(--gray) 12%, transparent);   color: var(--gray); }
  .pill.toFind .count  { background: color-mix(in srgb, var(--amber) 25%, transparent); }
  .pill.toRead .count  { background: color-mix(in srgb, var(--blue) 25%, transparent); }
  .pill.read .count    { background: color-mix(in srgb, var(--green) 25%, transparent); }
  .pill.stopped .count { background: color-mix(in srgb, var(--gray) 25%, transparent); }
  .pill.toFind.active  { border-color: var(--amber); }
  .pill.toRead.active  { border-color: var(--blue); }
  .pill.read.active    { border-color: var(--green); }
  .pill.stopped.active { border-color: var(--gray); }
  .shelf { padding: 0 12px 24px; display: flex; flex-direction: column; gap: 14px; }
  .shelf-section-title { padding: 4px 4px; font-weight: 600; font-size: 15px; }
  .shelf-section-title.toFind  { color: var(--amber); }
  .shelf-section-title.toRead  { color: var(--blue); }
  .shelf-section-title.read    { color: var(--green); }
  .shelf-section-title.stopped { color: var(--gray); }
  .book-card { display: flex; gap: 12px; background: var(--bg-elev); border-radius: 10px; padding: 12px; margin-bottom: 8px; }
  .cover {
    width: clamp(72px, 24vw, 132px);
    aspect-ratio: 50 / 72;
    height: auto;
    border-radius: 4px;
    background-size: cover; background-position: center;
    display: flex; align-items: center; justify-content: center;
    color: #fff; text-align: center; font-size: clamp(9px, 2.2vw, 13px); font-weight: 500; padding: 4px;
    flex: 0 0 auto;
  }
  .cover.sm {
    width: 36px; aspect-ratio: 50 / 72; height: auto;
    flex: 0 0 36px; font-size: 8px;
  }
  .book-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 4px; }
  .book-title { font-weight: 600; font-size: 14px; text-decoration: underline; cursor: pointer; }
  .book-year { font-style: italic; font-size: 12px; color: var(--text-2); margin-left: 4px; font-weight: 400; text-decoration: none; }
  .book-author { font-size: 12px; color: var(--text-2); }
  .book-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-top: 4px; }
  .btn { font-size: 12px; font-weight: 500; padding: 4px 10px; border-radius: 999px; }
  .btn.advance.toRead  { background: color-mix(in srgb, var(--blue) 15%, transparent);  color: var(--blue); }
  .btn.advance.read    { background: color-mix(in srgb, var(--green) 15%, transparent); color: var(--green); }
  .btn.advance.stopped { background: color-mix(in srgb, var(--gray) 18%, transparent);  color: var(--gray); }
  .btn.more { color: var(--text-2); background: transparent; padding: 4px 6px; }
  .date-pill { font-size: 12px; padding: 3px 8px; border-radius: 999px; }
  .date-pill.read { background: color-mix(in srgb, var(--green) 12%, transparent); color: var(--green); }
  .date-pill.stopped { background: color-mix(in srgb, var(--gray) 14%, transparent); color: var(--gray); }
  .book-side { display: flex; flex-direction: column; gap: 6px; align-items: center; }
  .icon-btn { width: 28px; height: 28px; border-radius: 50%; background: var(--bg-soft); color: var(--text-2); display: flex; align-items: center; justify-content: center; font-size: 14px; }
  .icon-btn.star.on { color: #ffcc00; }
  .more-panel { padding-top: 8px; border-top: 1px solid var(--bg-soft); margin-top: 8px; }
  .more-row { display: flex; gap: 8px; padding: 4px 0; align-items: center; }
  .more-row .add { margin-left: auto; color: var(--tint); font-weight: 500; font-size: 12px; }
  .more-loading { font-size: 12px; color: var(--text-2); padding: 6px 0; }

  /* Expenses */
  .summary-row { display: flex; gap: 6px; padding: 8px 12px; }
  .sum-pill {
    flex: 1; padding: 8px 10px; border-radius: 999px;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    font-weight: 600; font-size: 13px; border: 1.5px solid transparent;
  }
  .sum-pill.c { background: color-mix(in srgb, var(--blue) 10%, transparent);  color: var(--blue); }
  .sum-pill.m { background: color-mix(in srgb, var(--purple) 10%, transparent);color: var(--purple); }
  .sum-pill.bal { background: color-mix(in srgb, var(--text-2) 10%, transparent); color: var(--text-2); }
  .sum-pill.bal.pos { color: var(--green); background: color-mix(in srgb, var(--green) 10%, transparent); }
  .sum-pill.bal.neg { color: var(--red);   background: color-mix(in srgb, var(--red) 10%, transparent); }
  .sum-pill.c.on { border-color: var(--blue); background: color-mix(in srgb, var(--blue) 20%, transparent); }
  .sum-pill.m.on { border-color: var(--purple); background: color-mix(in srgb, var(--purple) 20%, transparent); }
  .expense-row { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-top: 1px solid var(--bg-soft); }
  .expense-row:first-child { border-top: 0; }
  .owner-badge {
    width: 26px; height: 26px; border-radius: 50%; color: #fff; font-weight: 700; font-size: 13px;
    display: flex; align-items: center; justify-content: center; flex: 0 0 26px;
  }
  .owner-badge.c { background: var(--blue); }
  .owner-badge.m { background: var(--purple); }
  .expense-title { flex: 1; cursor: pointer; font-size: 14px; }
  .expense-amount { font-weight: 600; font-size: 14px; }
  .expense-amount.c { color: var(--blue); }
  .expense-amount.m { color: var(--purple); }
  .expense-date { font-size: 11px; color: var(--text-2); }

  /* Travel */
  .trip-row { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-top: 1px solid var(--bg-soft); cursor: pointer; }
  .trip-row:first-child { border-top: 0; }
  .trip-icon { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; font-size: 20px; color: var(--tint); flex: 0 0 28px; }
  .pill-mini { font-size: 11px; padding: 2px 6px; border-radius: 999px; font-weight: 500; }
  .pill-mini.c { background: color-mix(in srgb, var(--blue) 18%, transparent); color: var(--blue); }
  .pill-mini.m { background: color-mix(in srgb, var(--purple) 18%, transparent); color: var(--purple); }
  .pill-mini.muted { background: color-mix(in srgb, var(--text-2) 12%, transparent); color: var(--text-2); }
  .travel-pill {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 12px; border-radius: 999px; font-size: 13px; font-weight: 500;
    border: 1.5px solid transparent;
  }
  .travel-pill.c { background: color-mix(in srgb, var(--blue) 12%, transparent); color: var(--blue); }
  .travel-pill.m { background: color-mix(in srgb, var(--purple) 12%, transparent); color: var(--purple); }
  .travel-pill.open { background: color-mix(in srgb, var(--orange) 12%, transparent); color: var(--orange); }
  .travel-pill.c.on { background: var(--blue); color: #fff; border-color: var(--blue); }
  .travel-pill.m.on { background: var(--purple); color: #fff; border-color: var(--purple); }
  .travel-pill.open.on { background: var(--orange); color: #fff; border-color: var(--orange); }
  .travel-item-row { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-top: 1px solid var(--bg-soft); }
  .travel-item-row:first-child { border-top: 0; }
  .owner-check {
    width: 26px; height: 26px; border-radius: 50%; border: 1.5px solid;
    display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 11px;
    cursor: pointer;
  }
  .owner-check.c { color: var(--blue); border-color: var(--blue); }
  .owner-check.m { color: var(--purple); border-color: var(--purple); }
  .owner-check.c.on { background: var(--blue); color: #fff; }
  .owner-check.m.on { background: var(--purple); color: #fff; }
  .travel-item-name { flex: 1; cursor: pointer; font-size: 14px; }
  .travel-item-name.both { text-decoration: line-through; color: var(--text-2); }

  /* Modal */
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.45);
    display: flex; align-items: flex-end; justify-content: center;
    z-index: 30;
  }
  .modal {
    background: var(--bg); width: 100%; max-width: 560px;
    max-height: 92vh; display: flex; flex-direction: column;
    border-radius: 14px 14px 0 0;
    padding-bottom: var(--safe-bot);
    overflow: hidden;
  }
  .modal .nav { position: relative; }
  .form { padding: 12px; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; }
  .form-section { background: var(--bg-elev); border-radius: var(--radius); overflow: hidden; }
  .form-section h3 { margin: 0; padding: 8px 16px 4px; font-size: 12px; text-transform: uppercase; color: var(--text-2); font-weight: 500; letter-spacing: 0.04em; }
  .form-row { padding: 8px 16px 12px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .form-row input[type=text], .form-row input[type=number], .form-row input[type=date], .form-row select {
    flex: 1; min-width: 0; padding: 10px 12px; border-radius: 10px; border: 1px solid var(--bg-tert); background: var(--bg);
  }
  .seg { display: flex; gap: 4px; flex-wrap: wrap; }
  .seg button {
    padding: 6px 12px; border-radius: 8px; background: var(--bg-soft); color: var(--text); font-size: 13px;
  }
  .seg button.on { background: var(--tint); color: #fff; }
  .seg button.c.on { background: var(--blue); }
  .seg button.m.on { background: var(--purple); }
  .toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; }
  .switch { width: 44px; height: 26px; border-radius: 999px; background: var(--bg-tert); position: relative; }
  .switch.on { background: var(--green); }
  .switch::after { content: ''; position: absolute; top: 2px; left: 2px; width: 22px; height: 22px; background: #fff; border-radius: 50%; transition: left 0.15s; }
  .switch.on::after { left: 20px; }
  .dates-row { padding: 12px 16px; display: flex; justify-content: space-between; font-size: 13px; color: var(--text-2); border-top: 1px solid var(--bg-soft); }
  .dates-row:first-of-type { border-top: 0; }
  .icon-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(52px, 1fr)); gap: 10px; padding: 12px 16px; }
  .icon-cell { width: 44px; height: 44px; border-radius: 8px; background: var(--bg-soft); display: flex; align-items: center; justify-content: center; font-size: 22px; margin: 0 auto; border: 2px solid transparent; }
  .icon-cell.on { background: var(--tint-soft); border-color: var(--tint); }
  .dropdown { background: var(--bg-elev); border-radius: 8px; margin: 0 12px 12px; max-height: 50vh; overflow-y: auto; }
  .dd-row { padding: 10px 12px; display: flex; align-items: center; gap: 8px; border-top: 1px solid var(--bg-soft); }
  .dd-row:first-child { border-top: 0; }
  .dd-row.tap { cursor: pointer; }
  .dd-row .src { font-size: 11px; color: var(--text-2); }
  .dd-row .name { flex: 1; font-size: 14px; min-width: 0; }
  .dd-row .meta { font-size: 11px; color: var(--text-2); }
  .dd-row .plus { color: var(--tint); font-size: 18px; }
  .photo-pick { display: flex; align-items: center; gap: 12px; padding: 8px 16px 12px; }

(() => {

// =====================================================================
// Utilities
// =====================================================================
function cryptoUUID() {
  if (crypto.randomUUID) return crypto.randomUUID();
  const b = crypto.getRandomValues(new Uint8Array(16));
  b[6] = (b[6] & 0x0f) | 0x40; b[8] = (b[8] & 0x3f) | 0x80;
  const h = [...b].map(x => x.toString(16).padStart(2, '0')).join('');
  return `${h.slice(0,8)}-${h.slice(8,12)}-${h.slice(12,16)}-${h.slice(16,20)}-${h.slice(20)}`;
}
function base64url(buf) {
  return btoa(String.fromCharCode(...new Uint8Array(buf)))
    .replaceAll('+', '-').replaceAll('/', '_').replaceAll('=', '');
}
async function sha256(str) { return crypto.subtle.digest('SHA-256', new TextEncoder().encode(str)); }
function randomVerifier() { return base64url(crypto.getRandomValues(new Uint8Array(64))); }
function ddMmYyyy(iso) {
  const d = new Date(iso);
  if (isNaN(d.getTime())) return '';
  return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
}
function formatEuros(amount) {
  const sign = amount < 0 ? '-' : '';
  return `${sign}€${Math.abs(amount).toFixed(2)}`;
}
function debounce(fn, ms) {
  let t = null;
  return (...args) => { if (t) clearTimeout(t); t = setTimeout(() => { t = null; fn(...args); }, ms); };
}
function placeholderColor(title) {
  let hash = 0;
  for (const ch of title) hash = (hash + ch.charCodeAt(0)) | 0;
  return `hsl(${(Math.abs(hash) % 360)}, 45%, 55%)`;
}
function firstThreeWords(title) { return title.trim().split(/\s+/).slice(0, 3).join(' '); }
function quantityDisplay(q) {
  const s = String(q.amount);
  return q.unit === 'count' ? `${UNIT_SYMBOL[q.unit]}${s}` : `${s}${UNIT_SYMBOL[q.unit]}`;
}
function dataURLFromBase64Jpeg(b64) { return `data:image/jpeg;base64,${b64}`; }
async function resizeImageToBase64(file, maxSide = 800, quality = 0.7) {
  const dataUrl = await new Promise((res, rej) => {
    const r = new FileReader(); r.onload = () => res(r.result); r.onerror = rej; r.readAsDataURL(file);
  });
  const img = await new Promise((res, rej) => {
    const i = new Image(); i.onload = () => res(i); i.onerror = rej; i.src = dataUrl;
  });
  const max = Math.max(img.width, img.height);
  const scale = max > maxSide ? maxSide / max : 1;
  const w = Math.round(img.width * scale), h = Math.round(img.height * scale);
  const canvas = document.createElement('canvas');
  canvas.width = w; canvas.height = h;
  canvas.getContext('2d').drawImage(img, 0, 0, w, h);
  return canvas.toDataURL('image/jpeg', quality).split(',', 2)[1];
}

// =====================================================================
// Token storage
// =====================================================================
const TOKEN_KEY = 'dropbox.refreshToken';
function saveRefreshToken(t) { localStorage.setItem(TOKEN_KEY, t); }
function loadRefreshToken() { return localStorage.getItem(TOKEN_KEY); }
function clearRefreshToken() { localStorage.removeItem(TOKEN_KEY); }

// =====================================================================
// Dropbox PKCE auth
// =====================================================================
let accessToken = null, accessTokenExp = 0;

async function startSignIn() {
  const verifier = randomVerifier();
  const challenge = base64url(await sha256(verifier));
  sessionStorage.setItem('pkce.verifier', verifier);
  const params = new URLSearchParams({
    client_id: APP_KEY, response_type: 'code',
    code_challenge: challenge, code_challenge_method: 'S256',
    token_access_type: 'offline', redirect_uri: REDIRECT_URI
  });
  window.location.href = `https://www.dropbox.com/oauth2/authorize?${params}`;
}
async function exchangeAuthCode(code) {
  const verifier = sessionStorage.getItem('pkce.verifier');
  sessionStorage.removeItem('pkce.verifier');
  if (!verifier) throw new Error('Missing PKCE verifier — start sign-in from this device.');
  let resp;
  try {
    resp = await fetch('https://api.dropboxapi.com/oauth2/token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({ code, grant_type: 'authorization_code', client_id: APP_KEY, redirect_uri: REDIRECT_URI, code_verifier: verifier }).toString()
    });
  } catch (e) {
    console.error('exchangeAuthCode fetch rejected', e);
    throw new Error(`Code exchange: ${e.name || 'Error'} — ${e.message}`);
  }
  if (!resp.ok) throw new Error('Code exchange: HTTP ' + resp.status + ' — ' + await resp.text());
  const j = await resp.json();
  accessToken = j.access_token;
  accessTokenExp = Date.now() + (j.expires_in - 60) * 1000;
  if (j.refresh_token) saveRefreshToken(j.refresh_token);
}
async function refreshAccessToken() {
  const refresh = loadRefreshToken();
  if (!refresh) throw new Error('Not authenticated.');
  let resp;
  try {
    resp = await fetch('https://api.dropboxapi.com/oauth2/token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({ grant_type: 'refresh_token', refresh_token: refresh, client_id: APP_KEY }).toString()
    });
  } catch (e) {
    console.error('refreshAccessToken fetch rejected', e);
    throw new Error(`Token refresh: ${e.name || 'Error'} — ${e.message}`);
  }
  if (!resp.ok) { clearRefreshToken(); throw new Error('Token refresh: HTTP ' + resp.status + ' — ' + await resp.text()); }
  const j = await resp.json();
  accessToken = j.access_token;
  accessTokenExp = Date.now() + (j.expires_in - 60) * 1000;
}
async function ensureAccessToken() {
  if (accessToken && Date.now() < accessTokenExp) return accessToken;
  await refreshAccessToken();
  return accessToken;
}
function signOut() {
  clearRefreshToken();
  accessToken = null;
  Object.assign(state, freshState());
  state.view = 'signin';
  render();
}

// =====================================================================
// Dropbox JSON
// =====================================================================
async function fetchWithRetry(url, opts, label) {
  for (let attempt = 0; attempt < 2; attempt++) {
    try {
      return await fetch(url, opts);
    } catch (e) {
      if (attempt === 0) {
        console.warn(`${label} fetch rejected, retrying`, e);
        await new Promise(r => setTimeout(r, 300));
        continue;
      }
      console.error(`${label} fetch rejected (final)`, e);
      throw new Error(`${label}: ${e.name || 'Error'} — ${e.message}`);
    }
  }
}
async function dbxReadJSON(path) {
  const token = await ensureAccessToken();
  const resp = await fetchWithRetry('https://content.dropboxapi.com/2/files/download', {
    method: 'POST',
    headers: { 'Authorization': `Bearer ${token}`, 'Dropbox-API-Arg': JSON.stringify({ path }) }
  }, `Read ${path}`);
  if (resp.status === 409) return null;
  if (!resp.ok) throw new Error(`Read ${path}: HTTP ${resp.status} — ` + await resp.text());
  return JSON.parse(await resp.text());
}
async function dbxWriteJSON(path, value) {
  const token = await ensureAccessToken();
  const arg = { path, mode: 'overwrite', autorename: false, mute: true, strict_conflict: false };
  const resp = await fetchWithRetry('https://content.dropboxapi.com/2/files/upload', {
    method: 'POST',
    headers: {
      'Authorization': `Bearer ${token}`,
      'Content-Type': 'application/octet-stream',
      'Dropbox-API-Arg': JSON.stringify(arg)
    },
    body: JSON.stringify(value, null, 2)
  }, `Write ${path}`);
  if (!resp.ok) throw new Error(`Write ${path}: HTTP ${resp.status} — ` + await resp.text());
}

// =====================================================================
// Open Library
// =====================================================================
const olAuthorBookCache = new Map();
const olAuthorSearchCache = new Map();

async function olSearchAuthors(query) {
  const key = query.toLowerCase().trim();
  if (olAuthorSearchCache.has(key)) return olAuthorSearchCache.get(key);
  try {
    const url = new URL('https://openlibrary.org/search/authors.json');
    url.searchParams.set('q', query); url.searchParams.set('limit', '10');
    const resp = await fetch(url);
    if (!resp.ok) return [];
    const j = await resp.json();
    const docs = (j.docs || []).map(d => ({ key: d.key, name: d.name, work_count: d.work_count }));
    olAuthorSearchCache.set(key, docs);
    return docs;
  } catch { return []; }
}
async function olFetchAuthorBooks(author) {
  const key = author.toLowerCase().trim();
  if (olAuthorBookCache.has(key)) return olAuthorBookCache.get(key);
  try {
    const url = new URL('https://openlibrary.org/search.json');
    url.searchParams.set('author', author); url.searchParams.set('limit', '40');
    const resp = await fetch(url);
    if (!resp.ok) return [];
    const j = await resp.json();
    const docs = (j.docs || []).map(d => ({
      title: d.title, first_publish_year: d.first_publish_year, cover_i: d.cover_i,
      coverURL: d.cover_i ? `https://covers.openlibrary.org/b/id/${d.cover_i}-M.jpg` : null
    }));
    olAuthorBookCache.set(key, docs);
    return docs;
  } catch { return []; }
}
function filterAuthorBooks(rawList) {
  const existing = new Set(state.books.map(b => b.title.toLowerCase()));
  return rawList.filter(b => !existing.has((b.title || '').toLowerCase()))
    .sort((a, b) => (b.first_publish_year || 0) - (a.first_publish_year || 0));
}

// =====================================================================
// State
// =====================================================================
function freshState() {
  return {
    view: 'signin',
    nav: ['main'],
    error: null, loading: false,
    loaded: { shopping: false, books: false, expenses: false, travel: false },
    // Shopping
    shops: [], shopCats: [], history: [], shopFoundFilter: 'all',
    // Books
    books: [], bookFilter: null, showFavOnly: false, expanded: new Set(),
    // Expenses
    expenses: [], expenseFilter: null,
    // Travel
    trips: [], templates: [], travelCats: [],
  };
}
const state = freshState();
let modal = null;

function normaliseCategory(c, defaultIcon) {
  if (typeof c === 'string') return { id: cryptoUUID(), name: c, icon: defaultIcon };
  return { id: c.id || cryptoUUID(), name: c.name, icon: c.icon || defaultIcon };
}

async function loadShoppingData() {
  const shops    = await dbxReadJSON(PATHS.shops);
  const shopCats = await dbxReadJSON(PATHS.shopCats);
  const history  = await dbxReadJSON(PATHS.history);
  state.shops = shops || [];
  state.shopCats = (shopCats || DEFAULT_SHOP_CATEGORIES).map(c => normaliseCategory(c, SHOPPING_DEFAULT_ICON));
  state.history = (history || []).sort((a, b) => new Date(b.lastUsedAt) - new Date(a.lastUsedAt));
}
async function loadBooksData() {
  const books = await dbxReadJSON(PATHS.books);
  state.books = (books || []).map(b => {
    const status = b.status === 'reading' ? 'toRead' : (STATUSES.includes(b.status) ? b.status : 'toFind');
    return {
      id: b.id || cryptoUUID(), title: b.title || '', author: b.author || '',
      publicationYear: b.publicationYear ?? null, coverURL: b.coverURL || null, status,
      addedAt: b.addedAt || new Date().toISOString(),
      statusChangedAt: b.statusChangedAt || b.addedAt || new Date().toISOString(),
      isFavourite: !!b.isFavourite
    };
  });
}
async function loadExpensesData() {
  const expenses = await dbxReadJSON(PATHS.expenses);
  state.expenses = (expenses || []).map(e => ({
    id: e.id || cryptoUUID(),
    title: e.title || e.note || '',
    amount: e.amount || 0,
    owner: e.owner || 'c',
    createdAt: e.createdAt || e.date || new Date().toISOString()
  })).sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
}
async function loadTravelData() {
  const trips      = await dbxReadJSON(PATHS.trips);
  const templates  = await dbxReadJSON(PATHS.templates);
  const travelCats = await dbxReadJSON(PATHS.travelCats);
  state.trips = (trips || []).map(t => ({
    id: t.id || cryptoUUID(), name: t.name || '',
    items: (t.items || []).map(normaliseTravelItem),
    createdAt: t.createdAt || new Date().toISOString()
  })).sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
  state.templates = (templates || []).map(t => ({
    id: t.id || cryptoUUID(), name: t.name || '',
    items: (t.items || []).map(normaliseTravelItem)
  }));
  state.travelCats = (travelCats || DEFAULT_TRAVEL_CATEGORIES).map(c => normaliseCategory(c, TRAVEL_DEFAULT_ICON));
}

const SECTION_LOADERS = {
  shopping: loadShoppingData,
  books:    loadBooksData,
  expenses: loadExpensesData,
  travel:   loadTravelData
};
const inflightSection = {};
function ensureSectionLoaded(name) {
  if (state.loaded[name]) return;
  if (inflightSection[name]) return;
  const loader = SECTION_LOADERS[name];
  if (!loader) return;
  inflightSection[name] = (async () => {
    state.loading = true; render();
    try {
      await loader();
      state.loaded[name] = true;
    } catch (e) {
      state.error = e.message;
    } finally {
      state.loading = false;
      delete inflightSection[name];
      render();
    }
  })();
}

function normaliseTravelItem(it) {
  let pc = it.packedByC, pm = it.packedByM;
  if (pc === undefined && pm === undefined) {
    const legacy = !!it.isPacked;
    pc = legacy; pm = legacy;
  }
  return {
    id: it.id || cryptoUUID(),
    name: it.name || '',
    category: it.category || null,
    packedByC: !!pc, packedByM: !!pm
  };
}

// =====================================================================
// Persistence helpers
// =====================================================================
async function saveShops() { try { await dbxWriteJSON(PATHS.shops, state.shops); } catch (e) { state.error = e.message; render(); } }
async function saveShopCats() { try { await dbxWriteJSON(PATHS.shopCats, state.shopCats); } catch (e) { state.error = e.message; render(); } }
async function saveHistory() { try { await dbxWriteJSON(PATHS.history, state.history); } catch (e) { state.error = e.message; render(); } }
async function saveBooks() { try { await dbxWriteJSON(PATHS.books, state.books); } catch (e) { state.error = e.message; render(); } }
async function saveExpenses() { try { await dbxWriteJSON(PATHS.expenses, state.expenses); } catch (e) { state.error = e.message; render(); } }
async function saveTrips() { try { await dbxWriteJSON(PATHS.trips, state.trips); } catch (e) { state.error = e.message; render(); } }
async function saveTemplates() { try { await dbxWriteJSON(PATHS.templates, state.templates); } catch (e) { state.error = e.message; render(); } }
async function saveTravelCats() { try { await dbxWriteJSON(PATHS.travelCats, state.travelCats); } catch (e) { state.error = e.message; render(); } }

// =====================================================================
// Shopping operations
// =====================================================================
function shopById(id) { return state.shops.find(s => s.id === id); }

async function addShop(name, emoji) {
  const t = (name || '').trim(); if (!t) return;
  state.shops.push({ id: cryptoUUID(), name: t, emoji: emoji || '🛒', items: [] });
  await saveShops(); render();
}
async function deleteShop(id) {
  state.shops = state.shops.filter(s => s.id !== id);
  await saveShops(); render();
}
async function addItem(shopId, item) {
  const sh = shopById(shopId); if (!sh) return;
  sh.items.push(item);
  await saveShops(); render();
}
async function updateItem(shopId, item) {
  const sh = shopById(shopId); if (!sh) return;
  const i = sh.items.findIndex(x => x.id === item.id);
  if (i < 0) return;
  sh.items[i] = item;
  await saveShops(); render();
}
async function deleteItem(shopId, id) {
  const sh = shopById(shopId); if (!sh) return;
  sh.items = sh.items.filter(i => i.id !== id);
  await saveShops(); render();
}
function toggleItem(shopId, id) {
  const sh = shopById(shopId); if (!sh) return;
  const it = sh.items.find(i => i.id === id); if (!it) return;
  it.isChecked = !it.isChecked;
  it.checkedAt = it.isChecked ? new Date().toISOString() : null;
  if (it.isChecked) upsertHistory(it);
  render();
  saveShops();
  if (it.isChecked) saveHistory();
}
async function clearChecked(shopId) {
  const sh = shopById(shopId); if (!sh) return;
  for (const it of sh.items.filter(i => i.isChecked)) upsertHistory(it);
  sh.items = sh.items.filter(i => !i.isChecked);
  await saveShops(); await saveHistory(); render();
}
function upsertHistory(item) {
  const key = item.name.trim().toLowerCase();
  const entry = {
    name: item.name.trim(), quantity: item.quantity, category: item.category || null,
    photo: item.photo || null, lastUsedAt: new Date().toISOString()
  };
  const i = state.history.findIndex(h => h.name.toLowerCase() === key);
  if (i >= 0) state.history[i] = entry; else state.history.push(entry);
  state.history.sort((a, b) => new Date(b.lastUsedAt) - new Date(a.lastUsedAt));
}
async function addFromPrevious(shopId, prev) {
  await addItem(shopId, {
    id: cryptoUUID(), name: prev.name, quantity: prev.quantity,
    category: prev.category || null, photo: prev.photo || null, isChecked: false
  });
}
async function addShopCategory(name, icon) {
  const t = (name || '').trim(); if (!t) return;
  if (state.shopCats.some(c => c.name.toLowerCase() === t.toLowerCase())) return;
  state.shopCats.push({ id: cryptoUUID(), name: t, icon });
  await saveShopCats(); render();
}
async function updateShopCategory(original, newName, newIcon) {
  const t = (newName || '').trim(); if (!t) return;
  const idx = state.shopCats.findIndex(c => c.id === original.id);
  if (idx < 0) return;
  if (state.shopCats.some(c => c.id !== original.id && c.name.toLowerCase() === t.toLowerCase())) return;
  const oldName = state.shopCats[idx].name;
  state.shopCats[idx] = { ...state.shopCats[idx], name: t, icon: newIcon };
  if (oldName !== t) {
    for (const s of state.shops) for (const it of s.items) if (it.category === oldName) it.category = t;
    for (const h of state.history) if (h.category === oldName) h.category = t;
    await saveShops(); await saveHistory();
  }
  await saveShopCats(); render();
}
async function deleteShopCategory(cat) {
  state.shopCats = state.shopCats.filter(c => c.id !== cat.id);
  for (const s of state.shops) for (const it of s.items) if (it.category === cat.name) it.category = null;
  for (const h of state.history) if (h.category === cat.name) h.category = null;
  await Promise.all([saveShopCats(), saveShops(), saveHistory()]); render();
}
function moveShopCategory(from, to) {
  if (from === to || from < 0 || to < 0) return;
  const list = state.shopCats.slice();
  const [moved] = list.splice(from, 1);
  list.splice(to, 0, moved);
  state.shopCats = list;
  saveShopCats().then(render);
}

// =====================================================================
// Books operations
// =====================================================================
async function addBook({ title, author, publicationYear, coverURL }) {
  const now = new Date().toISOString();
  state.books.push({
    id: cryptoUUID(), title: (title || '').trim(), author: (author || '').trim(),
    publicationYear: publicationYear || null, coverURL: coverURL || null,
    status: 'toFind', addedAt: now, statusChangedAt: now, isFavourite: false
  });
  await saveBooks(); render();
}
async function setBookStatus(book, status) {
  const b = state.books.find(x => x.id === book.id);
  if (!b || b.status === status) return;
  b.status = status; b.statusChangedAt = new Date().toISOString();
  await saveBooks(); render();
}
async function toggleBookFavourite(book) {
  const b = state.books.find(x => x.id === book.id); if (!b) return;
  b.isFavourite = !b.isFavourite;
  await saveBooks(); render();
}
async function updateBook(original, patch) {
  const b = state.books.find(x => x.id === original.id); if (!b) return;
  const titleAuthorChanged = patch.title !== b.title || patch.author !== b.author;
  const yearCoverUntouched = patch.publicationYear === b.publicationYear && patch.coverURL === b.coverURL;
  if (b.status !== patch.status) b.statusChangedAt = new Date().toISOString();
  b.title = patch.title.trim(); b.author = patch.author.trim();
  b.publicationYear = patch.publicationYear || null;
  b.status = patch.status; b.isFavourite = !!patch.isFavourite;
  if (titleAuthorChanged && yearCoverUntouched) {
    const list = await olFetchAuthorBooks(b.author);
    const match = list.find(x => x.title.toLowerCase() === b.title.toLowerCase());
    if (match) { b.publicationYear = match.first_publish_year || null; b.coverURL = match.coverURL || null; }
  }
  await saveBooks(); render();
}
async function deleteBook(book) {
  state.books = state.books.filter(b => b.id !== book.id);
  await saveBooks(); render();
}
function countBooksFor(status, favOnly) {
  return state.books.filter(b => b.status === status && (!favOnly || b.isFavourite)).length;
}
function bookSections() {
  let books = state.books;
  if (state.bookFilter) books = books.filter(b => b.status === state.bookFilter);
  if (state.showFavOnly) books = books.filter(b => b.isFavourite);
  const out = [];
  for (const s of STATUSES) {
    const items = books.filter(b => b.status === s);
    if (!items.length) continue;
    if (s === 'toFind') items.sort((a, b) => new Date(b.addedAt) - new Date(a.addedAt));
    else items.sort((a, b) => new Date(b.statusChangedAt) - new Date(a.statusChangedAt));
    out.push({ status: s, items });
  }
  return out;
}

function expenseTotalFor(o) { return state.expenses.filter(e => e.owner === o).reduce((s, e) => s + e.amount, 0); }
function expenseSuggestions(q) {
  const t = (q || '').trim().toLowerCase(); if (!t) return [];
  const seen = new Set(); const out = [];
  for (const e of state.expenses) {
    const k = e.title.toLowerCase();
    if (seen.has(k) || !k.includes(t)) continue;
    seen.add(k); out.push({ title: e.title, owner: e.owner });
    if (out.length >= 5) break;
  }
  return out;
}

async function addTravelCategory(name, icon) {
  const t = (name || '').trim(); if (!t) return;
  if (state.travelCats.some(c => c.name.toLowerCase() === t.toLowerCase())) return;
  state.travelCats.push({ id: cryptoUUID(), name: t, icon });
  await saveTravelCats(); render();
}
async function updateTravelCategory(original, newName, newIcon) {
  const t = (newName || '').trim(); if (!t) return;
  const idx = state.travelCats.findIndex(c => c.id === original.id);
  if (idx < 0) return;
  if (state.travelCats.some(c => c.id !== original.id && c.name.toLowerCase() === t.toLowerCase())) return;
  const oldName = state.travelCats[idx].name;
  state.travelCats[idx] = { ...state.travelCats[idx], name: t, icon: newIcon };
  if (oldName !== t) {
    for (const tr of state.trips) for (const it of tr.items) if (it.category === oldName) it.category = t;
    for (const tm of state.templates) for (const it of tm.items) if (it.category === oldName) it.category = t;
    await saveTrips(); await saveTemplates();
  }
  await saveTravelCats(); render();
}
async function deleteTravelCategory(cat) {
  state.travelCats = state.travelCats.filter(c => c.id !== cat.id);
  for (const tr of state.trips) for (const it of tr.items) if (it.category === cat.name) it.category = null;
  for (const tm of state.templates) for (const it of tm.items) if (it.category === cat.name) it.category = null;
  await Promise.all([saveTravelCats(), saveTrips(), saveTemplates()]); render();
}
function moveTravelCategory(from, to) {
  if (from === to || from < 0 || to < 0) return;
  const list = state.travelCats.slice();
  const [moved] = list.splice(from, 1);
  list.splice(to, 0, moved);
  state.travelCats = list;
  saveTravelCats().then(render);
}

// =====================================================================

// =====================================================================
function el(tag, cls, ...kids) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  for (const k of kids) {
    if (k == null || k === false) continue;
    if (typeof k === 'string' || typeof k === 'number') e.appendChild(document.createTextNode(String(k)));
    else e.appendChild(k);
  }
  return e;
}
function button(cls, text, onclick) {
  const b = el('button', cls, text); b.type = 'button';
  if (onclick) b.onclick = onclick;
  return b;
}

// =====================================================================
const root = document.getElementById('app');
function render() {
  root.innerHTML = '';
  let main;
  if (state.view === 'signin') {
    main = signInScreen();
  } else {
    const route = currentRoute();
    if (route === 'main') main = mainScreen();
    else if (route === 'shopping') { ensureSectionLoaded('shopping'); main = shoppingHomeScreen(); }
    else if (route === 'books') { ensureSectionLoaded('books'); main = booksScreen(); }
    else if (route === 'expenses') { ensureSectionLoaded('expenses'); main = expensesScreen(); }
    else if (route === 'travel') { ensureSectionLoaded('travel'); main = travelHomeScreen(); }
    else if (route && route.v === 'shop') { ensureSectionLoaded('shopping'); main = shopDetailScreen(route.id); }
    else if (route && route.v === 'trip') { ensureSectionLoaded('travel'); main = tripDetailScreen(route.id); }
    else if (route && route.v === 'template') { ensureSectionLoaded('travel'); main = templateDetailScreen(route.id); }
    else main = mainScreen();
  }
  root.appendChild(main);
  if (modal) root.appendChild(modal);
}

  const plus = el('button', 'plus', '＋'); plus.disabled = true;
  function commit() {
    const t = newName.trim(); if (!t) return;
    const prev = state.history.find(h => h.name.toLowerCase() === t.toLowerCase());
    if (prev) {
      addFromPrevious(shopId, prev).then(() => { inputName.value = ''; newName = ''; plus.disabled = true; refreshSuggestions(); });
    } else {
      openItemEditor({
        mode: 'new', shopId,
        seed: { id: cryptoUUID(), name: t, quantity: { amount: 1, unit: 'count' }, category: selectedCategory, photo: null, isChecked: false }
      }).then(() => { inputName.value = ''; newName = ''; plus.disabled = true; refreshSuggestions(); });
    }
  }
  inputName.addEventListener('keydown', (e) => { if (e.key === 'Enter') commit(); });
  plus.onclick = commit;

  const addbar = el('div', 'addbar');
  addbar.append(inputName, catSel, plus);
  wrap.appendChild(sugWrap);
  wrap.appendChild(addbar);
  return wrap;
}

function shopItemsList(shop) {
  const list = el('div', 'group-list');
  const unchecked = shop.items.filter(i => !i.isChecked);
  const checked = shop.items.filter(i => i.isChecked);
  const grouped = {};
  for (const it of unchecked) {
    const k = it.category || '__uncat__';
    (grouped[k] ||= []).push(it);
  }
  const knownNames = new Set(state.shopCats.map(c => c.name));
  const sections = [];
  for (const cat of state.shopCats) if (grouped[cat.name]) sections.push({ title: cat.name, icon: SHOPPING_ICONS[cat.icon] || '', items: grouped[cat.name] });
  for (const k of Object.keys(grouped)) {
    if (k === '__uncat__' || knownNames.has(k)) continue;
    sections.push({ title: k, icon: '', items: grouped[k] });
  }
  if (grouped['__uncat__']) sections.push({ title: UNCAT, icon: '', items: grouped['__uncat__'] });

  for (const sec of sections) {
    list.appendChild(el('div', 'section-title', sec.icon ? `${sec.icon} ${sec.title}` : sec.title));
    const card = el('div', 'section-card');
    for (const it of sec.items) card.appendChild(shopItemRow(shop, it));
    list.appendChild(card);
  }
  if (checked.length > 0) list.appendChild(buildFoundSection(shop, checked));
  return list;
}

function buildFoundSection(shop, checked) {
  const wrap = el('div');
  wrap.appendChild(el('div', 'section-title', '✅ Keuzelijst'));
  const usedCats = new Set(checked.map(i => i.category).filter(Boolean));
  const hasUncat = checked.some(i => !i.category);
  const filter = state.shopFoundFilter || 'all';
  if (usedCats.size > 0 || hasUncat) {
    const filterRow = el('div', 'hist-filter-row');
    for (const c of state.shopCats) {
      if (!usedCats.has(c.name)) continue;
      const chip = button('hist-chip', SHOPPING_ICONS[c.icon] || c.name[0], () => {
        state.shopFoundFilter = filter === `cat:${c.name}` ? 'all' : `cat:${c.name}`;
        render();
      });
      if (filter === `cat:${c.name}`) chip.classList.add('on');
      filterRow.appendChild(chip);
    }
    if (hasUncat) {
      const chip = button('hist-chip', UNCAT, () => {
        state.shopFoundFilter = filter === 'uncat' ? 'all' : 'uncat';
        render();
      });
      if (filter === 'uncat') chip.classList.add('on');
      filterRow.appendChild(chip);
    }
    wrap.appendChild(filterRow);
  }
  let items = checked;
  if (filter.startsWith('cat:')) items = items.filter(i => i.category === filter.slice(4));
  else if (filter === 'uncat') items = items.filter(i => !i.category);
  items = items.slice().sort((a, b) => (b.checkedAt || '').localeCompare(a.checkedAt || ''));
  const grid = el('div', 'found-grid');
  for (const it of items) {
    const cell = button('found-cell', '', () => toggleItem(shop.id, it.id));
    cell.append(el('div', 'h-name', it.name), el('div', 'h-qty', quantityDisplay(it.quantity)));
    grid.appendChild(cell);
  }
  wrap.appendChild(grid);
  return wrap;
}

function shopItemRow(shop, item) {
  const row = el('div', 'row item-row');
  row.style.cursor = 'pointer';
  if (item.isChecked) row.classList.add('checked');
  row.onclick = () => toggleItem(shop.id, item.id);

  if (item.photo) {
    const thumb = el('div', 'thumb'); thumb.style.backgroundImage = `url(${dataURLFromBase64Jpeg(item.photo)})`;
    thumb.onclick = (e) => { e.stopPropagation(); openPhotoViewer(item.photo); };
    row.appendChild(thumb);
  }
  row.appendChild(el('div', 'name', item.name));
  row.appendChild(el('span', 'qty', quantityDisplay(item.quantity)));

  const editBtn = button('icon-mini', '✎', (e) => {
    e.stopPropagation();
    openItemEditor({ mode: 'edit', shopId: shop.id, seed: { ...item } });
  });

  row.appendChild(button('danger', '✕', (e) => {
    e.stopPropagation();

function openItemEditor({ mode, shopId, seed }) {
  return new Promise((resolve) => {
    let name = seed.name, amount = seed.quantity.amount, unit = seed.quantity.unit;
    let category = seed.category, photo = seed.photo;
    const backdrop = el('div', 'modal-backdrop');
    const m = el('div', 'modal');
    const close = (r) => { backdrop.remove(); closeModal(); resolve(!!r); };

    const nav = el('div', 'nav');
    nav.append(button('', 'Cancel', () => close(false)), el('div', 'nav-title', mode === 'new' ? 'New Item' : 'Edit Item'),
      button('', 'Save', save));
    m.appendChild(nav);

    const form = el('div', 'form');
    const s1 = el('div', 'form-section'); s1.appendChild(el('h3', '', 'Name'));
    const nIn = el('input'); nIn.type = 'text'; nIn.value = name;
    nIn.addEventListener('input', () => name = nIn.value);
    s1.appendChild(el('div', 'form-row', nIn));

    const s2 = el('div', 'form-section'); s2.appendChild(el('h3', '', 'Quantity'));
    const aIn = el('input'); aIn.type = 'number'; aIn.step = 'any'; aIn.value = amount;
    aIn.addEventListener('input', () => amount = parseFloat(aIn.value));
    const seg = el('div', 'seg');
    ['count', 'gram', 'kilo'].forEach(u => {
      const b = el('button', '', UNIT_SYMBOL[u]); if (u === unit) b.classList.add('on');
      b.onclick = () => { unit = u; [...seg.children].forEach((bx, i) => bx.classList.toggle('on', ['count','gram','kilo'][i] === unit)); };
      seg.appendChild(b);
    });
    s2.appendChild(el('div', 'form-row', aIn, seg));

    const s3 = el('div', 'form-section'); s3.appendChild(el('h3', '', 'Category'));
    const catSel = el('select');
    const o0 = el('option', '', UNCAT); o0.value = ''; catSel.appendChild(o0);
    state.shopCats.forEach(c => {
      const o = el('option', '', `${SHOPPING_ICONS[c.icon] || '·'}  ${c.name}`); o.value = c.name; catSel.appendChild(o);
    });
    catSel.value = category || '';
    catSel.onchange = () => category = catSel.value || null;
    s3.appendChild(el('div', 'form-row', catSel));

    const s4 = el('div', 'form-section'); s4.appendChild(el('h3', '', 'Photo'));
    const pick = el('div', 'photo-pick');
    const prev = el('div', 'preview', photo ? '' : '📷');
    if (photo) prev.style.backgroundImage = `url(${dataURLFromBase64Jpeg(photo)})`;
    const filePick = el('input'); filePick.type = 'file'; filePick.accept = 'image/*'; filePick.style.display = 'none';
    filePick.onchange = async () => {
      const f = filePick.files?.[0]; if (!f) return;
      photo = await resizeImageToBase64(f);
      prev.style.backgroundImage = `url(${dataURLFromBase64Jpeg(photo)})`; prev.textContent = ''; rm.style.display = 'inline';
    };
    const btnsCol = el('div'); btnsCol.style.display = 'flex'; btnsCol.style.flexDirection = 'column'; btnsCol.style.gap = '4px';
    const pickBtn = button('link', photo ? 'Replace photo' : 'Pick photo', () => filePick.click());
    const rm = button('danger', 'Remove', () => { photo = null; prev.style.backgroundImage = ''; prev.textContent = '📷'; rm.style.display = 'none'; pickBtn.textContent = 'Pick photo'; });
    rm.style.display = photo ? 'inline' : 'none';
    btnsCol.append(pickBtn, rm, filePick);
    pick.append(prev, btnsCol);
    s4.appendChild(pick);

    form.append(s1, s2, s3, s4);
    m.appendChild(form);

    backdrop.appendChild(m);
    backdrop.onclick = (e) => { if (e.target === backdrop) close(false); };
    openModal(backdrop);

    async function save() {
      if (!name.trim() || !(amount > 0)) return;
      const item = { id: seed.id, name: name.trim(), quantity: { amount, unit }, category, photo, isChecked: seed.isChecked || false };
      if (mode === 'new') await addItem(shopId, item);
      else await updateItem(shopId, item);
      close(true);
    }
  });
}

function openHistoryModal(shopId) {
  const backdrop = el('div', 'modal-backdrop');
  const m = el('div', 'modal'); m.style.height = '92vh';
  let filter = 'all';
  const close = () => { backdrop.remove(); closeModal(); };

  const nav = el('div', 'nav');
  nav.append(el('div', 'ghost'), el('div', 'nav-title', 'Previous Items'), button('', 'Done', close));
  m.appendChild(nav);
  const filterRow = el('div', 'hist-filter-row');
  const grid = el('div', 'hist-grid');

  function rebuild() {
    const shop = shopById(shopId);
    const addedNames = new Set((shop?.items || []).map(i => i.name.toLowerCase()));
    const usedCats = new Set(state.history.map(h => h.category).filter(Boolean));
    const hasUncat = state.history.some(h => !h.category);

    filterRow.innerHTML = '';
    state.shopCats.filter(c => usedCats.has(c.name)).forEach(c => {
      const chip = el('button', 'hist-chip', SHOPPING_ICONS[c.icon] || c.name[0]);
      if (filter === `cat:${c.name}`) chip.classList.add('on');
      chip.onclick = () => { filter = filter === `cat:${c.name}` ? 'all' : `cat:${c.name}`; rebuild(); };
      filterRow.appendChild(chip);
    });
    if (hasUncat) {
      const chip = el('button', 'hist-chip', UNCAT);
      if (filter === 'uncat') chip.classList.add('on');
      chip.onclick = () => { filter = filter === 'uncat' ? 'all' : 'uncat'; rebuild(); };
      filterRow.appendChild(chip);
    }

    grid.innerHTML = '';
    let items = state.history;
    if (filter.startsWith('cat:')) items = items.filter(h => h.category === filter.slice(4));
    else if (filter === 'uncat') items = items.filter(h => !h.category);
    if (!items.length) {
      grid.appendChild(el('div', 'empty', el('div', 'e-icon', '📭'), el('div', '', 'Nothing here')));
      return;
    }
    items.forEach(h => {
      const added = addedNames.has(h.name.toLowerCase());
      const cell = el('div', 'hist-cell ' + (added ? 'added' : 'available'));
      cell.append(el('div', 'h-name', h.name), el('div', 'h-qty', quantityDisplay(h.quantity)));
      if (!added) cell.onclick = async () => { await addFromPrevious(shopId, h); rebuild(); };
      grid.appendChild(cell);
    });
  }

  const scroll = el('div', 'scroll'); scroll.style.padding = '0';
  scroll.append(filterRow, grid);
  m.appendChild(scroll);
  rebuild();
  backdrop.appendChild(m);
  backdrop.onclick = (e) => { if (e.target === backdrop) close(); };
  openModal(backdrop);
}

function coverElement(book, size = '') {
  const c = el('div', `cover ${size}`);

  if (book.coverURL) {
    const img = new Image();
    img.onload = () => { c.textContent = ''; c.style.backgroundImage = `url(${book.coverURL})`; c.style.backgroundColor = 'transparent'; };
    img.src = book.coverURL;

function bookCard(book) {
  const card = el('div', 'book-card');
  card.appendChild(coverElement(book));
  const info = el('div', 'book-info');
  const titleRow = el('div', '');
  const titleBtn = el('span', 'book-title', book.title);
  titleBtn.onclick = () => openEditBookModal(book);
  titleRow.appendChild(titleBtn);
  if (book.publicationYear) titleRow.appendChild(el('span', 'book-year', `(${book.publicationYear})`));
  info.appendChild(titleRow);
  if (book.author) info.appendChild(el('div', 'book-author', book.author));
  const actions = el('div', 'book-actions');
  if (book.status === 'toFind' || book.status === 'toRead') {
    for (const adv of ADVANCES[book.status]) actions.appendChild(button(`btn advance ${adv.to}`, adv.label, () => setBookStatus(book, adv.to)));
  } else {
    actions.appendChild(el('span', `date-pill ${book.status}`, ddMmYyyy(book.statusChangedAt)));
  }
  if (book.author) {
    const isOpen = state.expanded.has(book.id);
    actions.appendChild(button('btn more', isOpen ? 'Less ▲' : 'More… ▾', () => {
      if (isOpen) state.expanded.delete(book.id); else state.expanded.add(book.id);
      render();
    }));
  }
  info.appendChild(actions);
  card.appendChild(info);
  const side = el('div', 'book-side');
  side.appendChild(button('icon-btn', '✕', () => { if (confirm(`Delete "${book.title}"?`)) deleteBook(book); }));
  if (book.status === 'toRead' || book.status === 'read') {
    side.appendChild(button('icon-btn star' + (book.isFavourite ? ' on' : ''), book.isFavourite ? '★' : '☆', () => toggleBookFavourite(book)));
  }
  card.appendChild(side);
  if (state.expanded.has(book.id) && book.author) {
    const panel = el('div', 'more-panel'); panel.style.flexBasis = '100%';
    renderMorePanel(panel, book);
    card.style.flexWrap = 'wrap';
    card.appendChild(panel);
  }
  return card;
}
async function renderMorePanel(panel, book) {
  let cached = olAuthorBookCache.get(book.author.toLowerCase().trim());
  if (cached) { drawMorePanel(panel, book, filterAuthorBooks(cached)); return; }
  panel.appendChild(el('div', 'more-loading', `Loading other books by ${book.author}…`));
  const list = await olFetchAuthorBooks(book.author);
  panel.innerHTML = '';
  drawMorePanel(panel, book, filterAuthorBooks(list));
}
function drawMorePanel(panel, book, list) {
  if (!list.length) { panel.appendChild(el('div', 'more-loading', 'No other books found.')); return; }
  for (const r of list) {
    const row = el('div', 'more-row');
    row.appendChild(coverElement({ title: r.title, coverURL: r.coverURL }, 'sm'));
    const info = el('div', ''); info.style.flex = '1'; info.style.minWidth = '0';
    info.append(el('div', '', r.title), r.first_publish_year ? el('div', 'book-author', String(r.first_publish_year)) : null);
    row.appendChild(info);
    const addBtn = el('span', 'add', '+ Add');
    addBtn.onclick = async () => {
      await addBook({ title: r.title, author: book.author, publicationYear: r.first_publish_year || null, coverURL: r.coverURL || null });
    };
    row.appendChild(addBtn);
    panel.appendChild(row);
  }
}

function openAddBookModal() {
  let author = '', title = '', selectedAuthor = null;
  let authorOL = [], prefetched = [];
  const backdrop = el('div', 'modal-backdrop');
  const m = el('div', 'modal');
  const close = () => { backdrop.remove(); closeModal(); };

  const nav = el('div', 'nav');
  nav.append(button('', 'Cancel', close), el('div', 'nav-title', 'Add Book'), el('div', 'ghost'));
  m.appendChild(nav);

  const fieldPair = el('div', 'form-row');
  const aIn = el('input'); aIn.type = 'text'; aIn.placeholder = 'Author';
  const tIn = el('input'); tIn.type = 'text'; tIn.placeholder = 'Title';
  fieldPair.append(aIn, tIn);
  m.appendChild(fieldPair);
  m.appendChild(el('div', 'helper-tip', 'Type an author, pick one, then a title.'));
  const dd = el('div', 'dropdown'); m.appendChild(dd);

  const debSearch = debounce(async (q) => {
    if (q.trim().length < 2) { authorOL = []; renderDD(); return; }
    authorOL = await olSearchAuthors(q.trim());
    renderDD();
  }, 400);
  aIn.addEventListener('input', () => {
    author = aIn.value;
    if (selectedAuthor && author.trim().toLowerCase() !== selectedAuthor.toLowerCase()) {
      selectedAuthor = null; prefetched = [];
    }
    debSearch(author); renderDD();
  });
  tIn.addEventListener('input', () => { title = tIn.value; renderDD(); });
  tIn.addEventListener('focus', renderDD);
  aIn.addEventListener('focus', renderDD);

  async function selectAuthor(name) {
    selectedAuthor = name; aIn.value = name; author = name; tIn.focus();
    const list = olAuthorBookCache.get(name.toLowerCase().trim()) || await olFetchAuthorBooks(name);
    prefetched = filterAuthorBooks(list);
    renderDD();
  }
  function renderDD() {
    dd.innerHTML = '';
    const active = document.activeElement === tIn ? 'title' : 'author';
    if (active === 'author' || !selectedAuthor) {
      const libAuth = [...new Set(state.books.map(b => b.author).filter(Boolean))]
        .filter(a => a.toLowerCase().includes(author.trim().toLowerCase())).slice(0, 5);
      const seen = new Set();
      for (const a of libAuth) {
        seen.add(a.toLowerCase());
        const row = el('div', 'dd-row tap');
        row.append(el('span', 'src', '📚'), el('span', 'name', a));
        row.onclick = () => selectAuthor(a);
        dd.appendChild(row);
      }
      for (const a of authorOL) {
        if (seen.has(a.name.toLowerCase())) continue;
        const row = el('div', 'dd-row tap');
        row.append(el('span', 'src', '🔍'), el('span', 'name', a.name), a.work_count ? el('span', 'meta', `· ${a.work_count} works`) : null);
        row.onclick = () => selectAuthor(a.name);
        dd.appendChild(row);
      }
    } else {
      const q = title.trim().toLowerCase();
      let list = q ? prefetched.filter(b => (b.title || '').toLowerCase().includes(q)) : prefetched;
      list = list.slice(0, 20);
      if (!list.length) dd.appendChild(el('div', 'more-loading', 'No matching titles.'));
      for (const b of list) {
        const row = el('div', 'dd-row tap');
        row.append(coverElement({ title: b.title, coverURL: b.coverURL }, 'sm'),
          el('span', 'name', b.title),
          b.first_publish_year ? el('span', 'meta', String(b.first_publish_year)) : null,
          el('span', 'plus', '+'));
        row.onclick = async () => {
          await addBook({ title: b.title, author: selectedAuthor, publicationYear: b.first_publish_year || null, coverURL: b.coverURL || null });
          close();
        };
        dd.appendChild(row);
      }
    }
  }
  renderDD();

  backdrop.appendChild(m);
  backdrop.onclick = (e) => { if (e.target === backdrop) close(); };
  openModal(backdrop);
  setTimeout(() => aIn.focus(), 0);
}

function openExpenseEditorEdit(e) { openExpenseEditor({ mode: 'edit', original: e }); }

function openExpenseEditor({ mode, original }) {
  let title = mode === 'edit' ? original.title : '';
  let amountStr = mode === 'edit' ? String(original.amount.toFixed(2)) : '';
  let owner = mode === 'edit' ? original.owner : 'c';
  let createdAt = mode === 'edit' ? original.createdAt : new Date().toISOString();

  const backdrop = el('div', 'modal-backdrop');
  const m = el('div', 'modal');
  const close = () => { backdrop.remove(); closeModal(); };

  function parsedAmount() { const v = parseFloat((amountStr || '').replace(',', '.')); return v > 0 ? v : null; }
  function isValid() { return title.trim() && parsedAmount() != null; }

  const nav = el('div', 'nav');
  nav.append(button('', 'Cancel', close), el('div', 'nav-title', mode === 'new' ? 'New Expense' : 'Edit Expense'),
    button('', 'Save', async () => {
      if (!isValid()) return;
      const amt = parsedAmount();
      if (mode === 'new') await addExpense(title, amt, owner);
      else await updateExpense(original, { title, amount: amt, owner, createdAt });
      close();
    }));
  m.appendChild(nav);

  const form = el('div', 'form');
  const sT = el('div', 'form-section'); sT.appendChild(el('h3', '', 'Title'));
  const tIn = el('input'); tIn.type = 'text'; tIn.value = title; tIn.placeholder = 'Title';
  tIn.addEventListener('input', () => { title = tIn.value; if (mode === 'new') renderSuggs(); });
  sT.appendChild(el('div', 'form-row', tIn));
  const suggBox = el('div'); suggBox.style.padding = '0 8px';
  if (mode === 'new') sT.appendChild(suggBox);
  function renderSuggs() {
    suggBox.innerHTML = '';
    if (mode !== 'new') return;
    const s = expenseSuggestions(title);
    if (!s.length) return;
    s.forEach(sg => {
      const row = el('div', 'dd-row tap');
      row.append(el('div', `owner-badge ${sg.owner}`, sg.owner.toUpperCase()), el('span', 'name', sg.title));
      row.onclick = () => { title = sg.title; owner = sg.owner; tIn.value = sg.title; refreshOwnerBtns(); renderSuggs(); };
      suggBox.appendChild(row);
    });
  }
  form.appendChild(sT);

  const sA = el('div', 'form-section'); sA.appendChild(el('h3', '', 'Amount'));
  const aIn = el('input'); aIn.type = 'text'; aIn.inputMode = 'decimal'; aIn.placeholder = '€ Amount'; aIn.value = amountStr;
  aIn.addEventListener('input', () => amountStr = aIn.value);
  const seg = el('div', 'seg');
  const cBtn = el('button', `c${owner === 'c' ? ' on' : ''}`, 'C');
  const mBtn = el('button', `m${owner === 'm' ? ' on' : ''}`, 'M');
  function refreshOwnerBtns() {
    cBtn.classList.toggle('on', owner === 'c'); mBtn.classList.toggle('on', owner === 'm');
  }
  cBtn.onclick = () => { owner = 'c'; refreshOwnerBtns(); };
  mBtn.onclick = () => { owner = 'm'; refreshOwnerBtns(); };
  seg.append(cBtn, mBtn);
  sA.appendChild(el('div', 'form-row', aIn, seg));
  form.appendChild(sA);

  if (mode === 'edit') {
    const sD = el('div', 'form-section'); sD.appendChild(el('h3', '', 'Date'));
    const dIn = el('input'); dIn.type = 'date';
    dIn.value = createdAt.slice(0, 10);
    dIn.addEventListener('input', () => { const d = new Date(dIn.value + 'T12:00:00'); if (!isNaN(d.getTime())) createdAt = d.toISOString(); });
    sD.appendChild(el('div', 'form-row', dIn));
    form.appendChild(sD);
  }
  m.appendChild(form);
  backdrop.appendChild(m);
  backdrop.onclick = (e) => { if (e.target === backdrop) close(); };
  openModal(backdrop);
}

function tripDetailScreen(tripId) {
  const wrap = el('div'); wrap.style.display = 'flex'; wrap.style.flexDirection = 'column'; wrap.style.flex = '1';
  const trip = tripById(tripId);
  wrap.appendChild(navWith(trip ? trip.name : 'Trip', {
    back: navBack,
    right: button('icon', '✎', () => {
      const n = prompt('Rename trip:', trip?.name || ''); if (n) renameTrip(tripId, n);
    })
  }));

  // Filter pills (packing) and category filter row
  let packingFilter = null; // 'c' | 'm' | 'open'
  let catFilter = 'all'; // 'all' | `cat:name` | 'uncat'

  const scroll = el('div', 'scroll');
  const packingRow = el('div', 'filter-row');
  function rebuildPacking() {
    packingRow.innerHTML = '';
    if (!trip) return;
    const cLeft = trip.items.filter(i => !i.packedByC).length;
    const mLeft = trip.items.filter(i => !i.packedByM).length;
    const open = trip.items.filter(i => !i.packedByC || !i.packedByM).length;
    function pill(klass, content, key) {
      const b = el('button', `travel-pill ${klass}${packingFilter === key ? ' on' : ''}`);
      content.forEach(c => b.appendChild(typeof c === 'string' ? document.createTextNode(c) : c));
      b.onclick = () => { packingFilter = packingFilter === key ? null : key; rebuildPacking(); rebuildList(); };
      return b;
    }
    packingRow.appendChild(pill('c', [el('strong', '', 'C'), ` ${cLeft} left`], 'c'));
    packingRow.appendChild(pill('m', [el('strong', '', 'M'), ` ${mLeft} left`], 'm'));
    packingRow.appendChild(pill('open', [`◌ ${open} open`], 'open'));
  }
  rebuildPacking();
  scroll.appendChild(packingRow);

  const catRow = el('div', 'hist-filter-row');
  function rebuildCatRow() {
    catRow.innerHTML = '';
    if (!trip) return;
    const used = new Set(trip.items.map(i => i.category).filter(Boolean));
    const hasUncat = trip.items.some(i => !i.category);
    state.travelCats.filter(c => used.has(c.name)).forEach(c => {
      const chip = el('button', 'hist-chip', TRAVEL_ICONS[c.icon] || c.name[0]);
      if (catFilter === `cat:${c.name}`) chip.classList.add('on');
      chip.onclick = () => { catFilter = catFilter === `cat:${c.name}` ? 'all' : `cat:${c.name}`; rebuildCatRow(); rebuildList(); };
      catRow.appendChild(chip);
    });
    if (hasUncat) {
      const chip = el('button', 'hist-chip', UNCAT);
      if (catFilter === 'uncat') chip.classList.add('on');
      chip.onclick = () => { catFilter = catFilter === 'uncat' ? 'all' : 'uncat'; rebuildCatRow(); rebuildList(); };
      catRow.appendChild(chip);
    }
  }
  rebuildCatRow();
  scroll.appendChild(catRow);

  const listWrap = el('div');
  function applyFilters(items) {
    let out = items;
    if (packingFilter === 'c') out = out.filter(i => !i.packedByC);
    else if (packingFilter === 'm') out = out.filter(i => !i.packedByM);
    else if (packingFilter === 'open') out = out.filter(i => !i.packedByC || !i.packedByM);
    if (catFilter.startsWith('cat:')) out = out.filter(i => i.category === catFilter.slice(4));
    else if (catFilter === 'uncat') out = out.filter(i => !i.category);
    return out;
  }
  function rebuildList() {
    listWrap.innerHTML = '';
    if (!trip) return;
    const items = applyFilters(trip.items);
    if (items.length === 0) {
      listWrap.appendChild(el('div', 'empty', el('div', 'e-icon', trip.items.length ? '✓' : '🧳'),
        el('div', '', el('strong', '', trip.items.length ? 'Nothing Here' : 'Empty List'))));
      return;
    }
    const sections = travelSections(items);
    const groupList = el('div', 'group-list');
    sections.forEach(sec => {
      groupList.appendChild(el('div', 'section-title', sec.icon ? `${sec.icon} ${sec.title}` : sec.title));
      const card = el('div', 'section-card');
      sec.items.forEach(it => card.appendChild(tripItemRow(trip, it, rebuildPacking, rebuildCatRow, rebuildList)));
      groupList.appendChild(card);
    });
    listWrap.appendChild(groupList);
  }
  rebuildList();
  scroll.appendChild(listWrap);
  wrap.appendChild(scroll);

  // Add bar
  let newName = '', selCat = null;
  const inputName = el('input', 'name'); inputName.type = 'text'; inputName.placeholder = 'New item';
  inputName.addEventListener('input', () => { newName = inputName.value; plus.disabled = !newName.trim(); });
  const catSel = el('select');
  const o0 = el('option', '', UNCAT); o0.value = ''; catSel.appendChild(o0);
  state.travelCats.forEach(c => {
    const o = el('option', '', `${TRAVEL_ICONS[c.icon] || '·'}  ${c.name}`); o.value = c.name; catSel.appendChild(o);
  });
  catSel.onchange = () => selCat = catSel.value || null;
  const plus = el('button', 'plus', '＋'); plus.disabled = true;
  function commit() {
    const t = newName.trim(); if (!t) return;
    addTripItem(tripId, { id: cryptoUUID(), name: t, category: selCat, packedByC: false, packedByM: false })
      .then(() => { inputName.value = ''; newName = ''; plus.disabled = true; });
  }
  inputName.addEventListener('keydown', (e) => { if (e.key === 'Enter') commit(); });
  plus.onclick = commit;
  const addbar = el('div', 'addbar');
  addbar.append(inputName, catSel, plus);
  wrap.appendChild(addbar);
  return wrap;
}

function travelSections(items) {
  const grouped = {};
  for (const it of items) {
    const k = it.category || '__uncat__';
    (grouped[k] ||= []).push(it);
  }
  const known = new Set(state.travelCats.map(c => c.name));
  const sections = [];
  for (const cat of state.travelCats) if (grouped[cat.name]) sections.push({ title: cat.name, icon: TRAVEL_ICONS[cat.icon] || '', items: grouped[cat.name] });
  for (const k of Object.keys(grouped)) {
    if (k === '__uncat__' || known.has(k)) continue;
    sections.push({ title: k, icon: '', items: grouped[k] });
  }
  if (grouped['__uncat__']) sections.push({ title: UNCAT, icon: '', items: grouped['__uncat__'] });
  return sections;
}

  const mBox = el('button', `owner-check m${item.packedByM ? ' on' : ''}`, 'M');
  mBox.onclick = (e) => { e.stopPropagation(); togglePacked(trip.id, item.id, 'm').then(() => { rebPacking(); rebList(); }); };
  const nameEl = el('div', 'travel-item-name' + (item.packedByC && item.packedByM ? ' both' : ''), item.name);
  nameEl.onclick = () => openTravelItemEditor({ mode: 'trip', tripId: trip.id, item });
  row.append(cBox, mBox, nameEl,
    button('danger', '✕', (e) => { e.stopPropagation(); if (confirm(`Delete "${item.name}"?`)) deleteTripItem(trip.id, item.id).then(() => { rebPacking(); rebCat(); rebList(); }); })
  );
  return row;
}

  catSel.onchange = () => selCat = catSel.value || null;
  const plus = el('button', 'plus', '＋'); plus.disabled = true;
  function commit() {
    const t = newName.trim(); if (!t) return;
    addTemplateItem(templateId, { id: cryptoUUID(), name: t, category: selCat, packedByC: false, packedByM: false })
      .then(() => { inputName.value = ''; newName = ''; plus.disabled = true; rebuildCat(); rebuildList(); });
  }
  inputName.addEventListener('keydown', (e) => { if (e.key === 'Enter') commit(); });
  plus.onclick = commit;
  const addbar = el('div', 'addbar');
  addbar.append(inputName, catSel, plus);
  wrap.appendChild(addbar);
  return wrap;
}

function openTravelItemEditor({ mode, tripId, templateId, item }) {
  let name = item.name, category = item.category;
  const backdrop = el('div', 'modal-backdrop');
  const m = el('div', 'modal');
  const close = () => { backdrop.remove(); closeModal(); };
  const nav = el('div', 'nav');
  nav.append(button('', 'Cancel', close), el('div', 'nav-title', 'Edit Item'),
    button('', 'Save', async () => {
      if (!name.trim()) return;
      const updated = { ...item, name: name.trim(), category };
      if (mode === 'trip') await updateTripItem(tripId, updated);
      else await updateTemplateItem(templateId, updated);
      close();
    }));
  m.appendChild(nav);
  const form = el('div', 'form');
  const s1 = el('div', 'form-section'); s1.appendChild(el('h3', '', 'Name'));
  const nIn = el('input'); nIn.type = 'text'; nIn.value = name;
  nIn.addEventListener('input', () => name = nIn.value);
  s1.appendChild(el('div', 'form-row', nIn));
  const s2 = el('div', 'form-section'); s2.appendChild(el('h3', '', 'Category'));
  const catSel = el('select');
  const o0 = el('option', '', UNCAT); o0.value = ''; catSel.appendChild(o0);
  state.travelCats.forEach(c => {
    const o = el('option', '', `${TRAVEL_ICONS[c.icon] || '·'}  ${c.name}`); o.value = c.name; catSel.appendChild(o);
  });
  catSel.value = category || ''; catSel.onchange = () => category = catSel.value || null;
  s2.appendChild(el('div', 'form-row', catSel));
  form.append(s1, s2);
  m.appendChild(form);
  backdrop.appendChild(m);
  backdrop.onclick = (e) => { if (e.target === backdrop) close(); };
  openModal(backdrop);
}

// =====================================================================
// Boot
// =====================================================================
(async function boot() {
  try {
    const url = new URL(window.location.href);
    const code = url.searchParams.get('code');
    if (code) {
      try {
        state.loading = true; render();
        await exchangeAuthCode(code);
        url.searchParams.delete('code'); url.searchParams.delete('state');
        window.history.replaceState({}, '', url.pathname + (url.search ? '?' + url.searchParams.toString() : ''));
      } catch (e) { state.error = e.message; }
      finally { state.loading = false; }
    }
    if (loadRefreshToken()) {
      state.view = 'main'; render();
    } else {
      state.view = 'signin'; render();
    }
  } catch (e) {
    state.error = e.message; render();
  }
})();

})();
</script>
