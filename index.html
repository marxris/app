<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>MarXris</title>
<style>
  :root {
    --bg: #f2f2f7;
    --bg-elev: #ffffff;
    --bg-soft: #e5e5ea;
    --bg-tert: #d1d1d6;
    --tint: #007aff;
    --tint-soft: rgba(0, 122, 255, 0.14);
    --green: #34c759;
    --red: #ff3b30;
    --orange: #ff9500;
    --blue: #007aff;
    --purple: #af52de;
    --pink: #f23388;
    --amber: #d99000;
    --gray: #8e8e93;
    --text: #000;
    --text-2: #6c6c70;
    --radius: 12px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bot: env(safe-area-inset-bottom, 0px);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #000;
      --bg-elev: #1c1c1e;
      --bg-soft: #2c2c2e;
      --bg-tert: #3a3a3c;
      --tint-soft: rgba(10, 132, 255, 0.22);
      --tint: #0a84ff;
      --text: #fff;
      --text-2: #98989d;
      --gray: #8e8e93;
    }
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text);
    font: 16px -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
    -webkit-tap-highlight-color: transparent;
  }
  button { font: inherit; color: inherit; background: none; border: 0; padding: 0; cursor: pointer; }
  input, select, textarea { font: inherit; color: inherit; }
  #app { min-height: 100%; display: flex; flex-direction: column; }

  .nav {
    position: sticky; top: 0; z-index: 10;
    padding: calc(var(--safe-top) + 6px) 12px 6px;
    display: flex; align-items: center; gap: 8px;
    background: color-mix(in srgb, var(--bg) 92%, transparent);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
  }
  .nav-title { font-size: 17px; font-weight: 600; flex: 1; text-align: center; }
  .nav button { color: var(--tint); font-size: 16px; padding: 6px; min-width: 32px; }
  .nav button.icon { font-size: 22px; line-height: 1; }
  .nav .ghost { width: 32px; }

  .scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: calc(var(--safe-bot) + 24px); }
  .bottombar {
    padding: 8px 12px calc(10px + var(--safe-bot));
    background: color-mix(in srgb, var(--bg) 92%, transparent);
    backdrop-filter: saturate(180%) blur(20px);
    border-top: 1px solid var(--bg-soft);
    display: flex; align-items: center; justify-content: center;
  }
  .bottombar button {
    color: var(--tint); font-weight: 500; padding: 8px 14px;
    display: flex; align-items: center; gap: 6px;
  }

  .signin {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 18px; padding: 24px; text-align: center;
  }
  .signin h1 { margin: 0; font-size: 34px; font-weight: 800; letter-spacing: -0.02em; }
  .signin p { color: var(--text-2); max-width: 28em; line-height: 1.4; }
  .primary {
    background: var(--tint); color: #fff; font-weight: 600;
    padding: 14px 22px; border-radius: 14px; min-width: 240px;
  }
  .help { font-size: 12px; color: var(--text-2); max-width: 32em; line-height: 1.5; }
  .help code { background: var(--bg-soft); padding: 1px 6px; border-radius: 4px; font-size: 11px; }
  .err { color: var(--red); font-size: 13px; padding: 6px 12px; }

  /* Main page */
  .main-welcome {
    font-size: 30px; font-weight: 800; letter-spacing: -0.02em; text-align: center; padding: 36px 16px 8px;
  }
  .main-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding: 16px;
  }
  .tile {
    border-radius: 16px; padding: 28px 12px;
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    cursor: pointer; transition: transform 0.08s;
  }
  .tile:active { transform: scale(0.98); }
  .tile.disabled { opacity: 0.45; cursor: default; }
  .tile-icon { font-size: 44px; line-height: 1; }
  .tile-name { font-weight: 600; font-size: 17px; }
  .tile.shopping { background: color-mix(in srgb, var(--blue) 14%, transparent); color: var(--blue); }
  .tile.expenses { background: color-mix(in srgb, var(--green) 14%, transparent); color: var(--green); }
  .tile.books    { background: color-mix(in srgb, var(--orange) 14%, transparent); color: var(--orange); }
  .tile.travel   { background: color-mix(in srgb, var(--purple) 14%, transparent); color: var(--purple); }
  .account-card { margin: 0 16px 16px; padding: 0; background: var(--bg-elev); border-radius: var(--radius); }
  .acc-row { padding: 14px 16px; display: flex; align-items: center; gap: 8px; }
  .danger { color: var(--red); font-weight: 500; }

  /* Books */
  .filter-row {
    display: flex; gap: 8px; padding: 8px 12px; overflow-x: auto; align-items: center;
  }
  .pill {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 12px; border-radius: 999px; font-size: 13px; font-weight: 500;
    border: 1.5px solid transparent;
  }
  .pill .count {
    padding: 1px 6px; border-radius: 999px;
    background: rgba(255,255,255,0.2);
  }
  .pill.toFind  { background: color-mix(in srgb, var(--amber) 12%, transparent);  color: var(--amber); }
  .pill.toRead  { background: color-mix(in srgb, var(--blue) 12%, transparent);   color: var(--blue); }
  .pill.read    { background: color-mix(in srgb, var(--green) 12%, transparent);  color: var(--green); }
  .pill.stopped { background: color-mix(in srgb, var(--gray) 12%, transparent);   color: var(--gray); }
  .pill.toFind .count  { background: color-mix(in srgb, var(--amber) 25%, transparent); }
  .pill.toRead .count  { background: color-mix(in srgb, var(--blue) 25%, transparent); }
  .pill.read .count    { background: color-mix(in srgb, var(--green) 25%, transparent); }
  .pill.stopped .count { background: color-mix(in srgb, var(--gray) 25%, transparent); }
  .pill.toFind.active  { border-color: var(--amber); }
  .pill.toRead.active  { border-color: var(--blue); }
  .pill.read.active    { border-color: var(--green); }
  .pill.stopped.active { border-color: var(--gray); }

  .shelf { padding: 0 12px 24px; display: flex; flex-direction: column; gap: 14px; }
  .shelf-section-title { padding: 4px 4px; font-weight: 600; font-size: 15px; }
  .shelf-section-title.toFind  { color: var(--amber); }
  .shelf-section-title.toRead  { color: var(--blue); }
  .shelf-section-title.read    { color: var(--green); }
  .shelf-section-title.stopped { color: var(--gray); }

  .book-card {
    display: flex; gap: 12px;
    background: var(--bg-elev); border-radius: 10px;
    padding: 12px; margin-bottom: 8px;
  }
  .cover {
    width: 50px; height: 72px; border-radius: 4px;
    background-size: cover; background-position: center;
    display: flex; align-items: center; justify-content: center;
    color: #fff; text-align: center; font-size: 9px; font-weight: 500;
    padding: 3px; flex: 0 0 50px;
  }
  .cover.sm { width: 32px; height: 46px; flex: 0 0 32px; font-size: 7px; }
  .book-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 4px; }
  .book-title {
    font-weight: 600; font-size: 14px;
    text-decoration: underline; text-decoration-style: solid;
    cursor: pointer;
  }
  .book-year { font-style: italic; font-size: 12px; color: var(--text-2); margin-left: 4px; font-weight: 400; text-decoration: none; }
  .book-author { font-size: 12px; color: var(--text-2); }
  .book-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-top: 4px; }
  .book-actions .btn {
    font-size: 12px; font-weight: 500;
    padding: 4px 10px; border-radius: 999px;
  }
  .btn.advance.toRead  { background: color-mix(in srgb, var(--blue) 15%, transparent);  color: var(--blue); }
  .btn.advance.read    { background: color-mix(in srgb, var(--green) 15%, transparent); color: var(--green); }
  .btn.advance.stopped { background: color-mix(in srgb, var(--gray) 18%, transparent);  color: var(--gray); }
  .btn.more { color: var(--text-2); background: transparent; padding: 4px 6px; }
  .date-pill {
    font-size: 12px; padding: 3px 8px; border-radius: 999px;
  }
  .date-pill.read    { background: color-mix(in srgb, var(--green) 12%, transparent); color: var(--green); }
  .date-pill.stopped { background: color-mix(in srgb, var(--gray) 14%, transparent);  color: var(--gray); }
  .book-side { display: flex; flex-direction: column; gap: 6px; align-items: center; }
  .icon-btn {
    width: 28px; height: 28px; border-radius: 50%; background: var(--bg-soft);
    color: var(--text-2); display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }
  .icon-btn.star.on { color: #ffcc00; background: var(--bg-soft); }

  .more-panel { padding-top: 8px; border-top: 1px solid var(--bg-soft); margin-top: 8px; }
  .more-row {
    display: flex; gap: 8px; padding: 4px 0; align-items: center;
  }
  .more-row .add {
    margin-left: auto; color: var(--tint); font-weight: 500; font-size: 12px;
  }
  .more-loading { font-size: 12px; color: var(--text-2); padding: 6px 0; }

  /* Modal */
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.45);
    display: flex; align-items: flex-end; justify-content: center;
    z-index: 30;
  }
  .modal {
    background: var(--bg); width: 100%; max-width: 560px;
    max-height: 92vh; display: flex; flex-direction: column;
    border-radius: 14px 14px 0 0;
    padding-bottom: var(--safe-bot);
  }
  .form { padding: 12px; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; }
  .form-section { background: var(--bg-elev); border-radius: var(--radius); overflow: hidden; }
  .form-section h3 { margin: 0; padding: 8px 16px 4px; font-size: 12px; text-transform: uppercase; color: var(--text-2); font-weight: 500; letter-spacing: 0.04em; }
  .form-row { padding: 8px 16px 12px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .form-row input[type=text], .form-row input[type=number] {
    flex: 1; min-width: 0; padding: 10px 12px; border-radius: 10px; border: 1px solid var(--bg-tert); background: var(--bg);
  }
  .field-pair { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 8px 12px 12px; }
  .field-pair input { padding: 10px 12px; border-radius: 10px; border: 1px solid var(--bg-tert); background: var(--bg); }

  .dropdown {
    background: var(--bg-elev); border-radius: 8px;
    margin: 0 12px 12px; max-height: 50vh; overflow-y: auto;
  }
  .dd-row {
    padding: 10px 12px; display: flex; align-items: center; gap: 8px;
    border-top: 1px solid var(--bg-soft);
  }
  .dd-row:first-child { border-top: 0; }
  .dd-row.tap { cursor: pointer; }
  .dd-row.tap:active { background: var(--bg-soft); }
  .dd-row .src { font-size: 11px; color: var(--text-2); }
  .dd-row .name { flex: 1; font-size: 14px; min-width: 0; }
  .dd-row .meta { font-size: 11px; color: var(--text-2); }
  .dd-row .plus { color: var(--tint); font-size: 18px; }

  /* Edit modal */
  .picker-row { padding: 8px 12px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .seg button {
    padding: 6px 12px; border-radius: 8px; background: var(--bg-soft); color: var(--text); font-size: 13px;
  }
  .seg button.on { background: var(--tint); color: #fff; }
  .toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; }
  .switch {
    width: 44px; height: 26px; border-radius: 999px; background: var(--bg-tert); position: relative;
    transition: background 0.15s;
  }
  .switch.on { background: var(--green); }
  .switch::after {
    content: ''; position: absolute; top: 2px; left: 2px; width: 22px; height: 22px;
    background: #fff; border-radius: 50%; transition: left 0.15s;
  }
  .switch.on::after { left: 20px; }
  .dates-row { padding: 12px 16px; display: flex; justify-content: space-between; font-size: 13px; color: var(--text-2); border-top: 1px solid var(--bg-soft); }
  .dates-row:first-of-type { border-top: 0; }

  .empty {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 8px; color: var(--text-2); padding: 60px 24px; text-align: center;
  }
  .empty .e-icon { font-size: 48px; opacity: 0.5; }

  .helper-tip { font-size: 12px; color: var(--text-2); padding: 8px 16px; }
</style>
</head>
<body>
<div id="app"></div>
<script>
(() => {
'use strict';

// =====================================================================
// Config
// =====================================================================
const APP_KEY = '6c8d4is46ktgahy';
const REDIRECT_URI = window.location.origin + window.location.pathname;

const BOOKS_PATH = '/books/list.json';

// =====================================================================
// Status metadata
// =====================================================================
const STATUSES = ['toFind', 'toRead', 'read', 'stopped'];
const STATUS_LABEL = { toFind: 'To Find', toRead: 'To Read', read: 'Read', stopped: 'Stop' };
const ADVANCES = {
  toFind:  [{ to: 'toRead',  label: 'Found ✓' }],
  toRead:  [{ to: 'read',    label: 'Read ✓' }, { to: 'stopped', label: 'Stopped' }],
  read:    [],
  stopped: []
};

// =====================================================================
// Utilities
// =====================================================================
function cryptoUUID() {
  if (crypto.randomUUID) return crypto.randomUUID();
  const b = crypto.getRandomValues(new Uint8Array(16));
  b[6] = (b[6] & 0x0f) | 0x40; b[8] = (b[8] & 0x3f) | 0x80;
  const h = [...b].map(x => x.toString(16).padStart(2, '0')).join('');
  return `${h.slice(0,8)}-${h.slice(8,12)}-${h.slice(12,16)}-${h.slice(16,20)}-${h.slice(20)}`;
}
function base64url(buf) {
  return btoa(String.fromCharCode(...new Uint8Array(buf)))
    .replaceAll('+', '-').replaceAll('/', '_').replaceAll('=', '');
}
async function sha256(str) { return crypto.subtle.digest('SHA-256', new TextEncoder().encode(str)); }
function randomVerifier() {
  const bytes = crypto.getRandomValues(new Uint8Array(64));
  return base64url(bytes);
}
function ddMmYyyy(iso) {
  const d = new Date(iso);
  if (isNaN(d.getTime())) return '';
  const dd = String(d.getDate()).padStart(2, '0');
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  return `${dd}/${mm}/${d.getFullYear()}`;
}
function debounce(fn, ms) {
  let t = null;
  return (...args) => {
    if (t) clearTimeout(t);
    t = setTimeout(() => { t = null; fn(...args); }, ms);
  };
}
function placeholderColor(title) {
  let hash = 0;
  for (const ch of title) hash = (hash + ch.charCodeAt(0)) | 0;
  const hue = (Math.abs(hash) % 360);
  return `hsl(${hue}, 45%, 55%)`;
}
function firstThreeWords(title) {
  return title.trim().split(/\s+/).slice(0, 3).join(' ');
}

// =====================================================================
// Token storage
// =====================================================================
const TOKEN_KEY = 'dropbox.refreshToken';
function saveRefreshToken(t) { localStorage.setItem(TOKEN_KEY, t); }
function loadRefreshToken() { return localStorage.getItem(TOKEN_KEY); }
function clearRefreshToken() { localStorage.removeItem(TOKEN_KEY); }

// =====================================================================
// Dropbox PKCE auth
// =====================================================================
let accessToken = null;
let accessTokenExp = 0;

async function startSignIn() {
  const verifier = randomVerifier();
  const challenge = base64url(await sha256(verifier));
  sessionStorage.setItem('pkce.verifier', verifier);
  const params = new URLSearchParams({
    client_id: APP_KEY,
    response_type: 'code',
    code_challenge: challenge,
    code_challenge_method: 'S256',
    token_access_type: 'offline',
    redirect_uri: REDIRECT_URI
  });
  window.location.href = `https://www.dropbox.com/oauth2/authorize?${params}`;
}

async function exchangeAuthCode(code) {
  const verifier = sessionStorage.getItem('pkce.verifier');
  sessionStorage.removeItem('pkce.verifier');
  if (!verifier) throw new Error('Missing PKCE verifier — start sign-in from this device.');
  const resp = await fetch('https://api.dropboxapi.com/oauth2/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({
      code, grant_type: 'authorization_code', client_id: APP_KEY,
      redirect_uri: REDIRECT_URI, code_verifier: verifier
    })
  });
  if (!resp.ok) throw new Error('Token exchange failed: ' + await resp.text());
  const j = await resp.json();
  accessToken = j.access_token;
  accessTokenExp = Date.now() + (j.expires_in - 60) * 1000;
  if (j.refresh_token) saveRefreshToken(j.refresh_token);
}

async function refreshAccessToken() {
  const refresh = loadRefreshToken();
  if (!refresh) throw new Error('Not authenticated.');
  const resp = await fetch('https://api.dropboxapi.com/oauth2/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({
      grant_type: 'refresh_token', refresh_token: refresh, client_id: APP_KEY
    })
  });
  if (!resp.ok) { clearRefreshToken(); throw new Error('Refresh failed: ' + await resp.text()); }
  const j = await resp.json();
  accessToken = j.access_token;
  accessTokenExp = Date.now() + (j.expires_in - 60) * 1000;
}

async function ensureAccessToken() {
  if (accessToken && Date.now() < accessTokenExp) return accessToken;
  await refreshAccessToken();
  return accessToken;
}

function signOut() {
  clearRefreshToken();
  accessToken = null;
  state.books = [];
  state.view = 'signin';
  render();
}

// =====================================================================
// Dropbox JSON
// =====================================================================
async function dbxReadJSON(path) {
  const token = await ensureAccessToken();
  const resp = await fetch('https://content.dropboxapi.com/2/files/download', {
    method: 'POST',
    headers: { 'Authorization': `Bearer ${token}`, 'Dropbox-API-Arg': JSON.stringify({ path }) }
  });
  if (resp.status === 409) return null;
  if (!resp.ok) throw new Error('Download failed: ' + await resp.text());
  return JSON.parse(await resp.text());
}
async function dbxWriteJSON(path, value) {
  const token = await ensureAccessToken();
  const arg = { path, mode: 'overwrite', autorename: false, mute: true, strict_conflict: false };
  const resp = await fetch('https://content.dropboxapi.com/2/files/upload', {
    method: 'POST',
    headers: {
      'Authorization': `Bearer ${token}`,
      'Content-Type': 'application/octet-stream',
      'Dropbox-API-Arg': JSON.stringify(arg)
    },
    body: JSON.stringify(value, null, 2)
  });
  if (!resp.ok) throw new Error('Upload failed: ' + await resp.text());
}

// =====================================================================
// Open Library
// =====================================================================
const olAuthorBookCache = new Map();
const olAuthorSearchCache = new Map();

async function olSearchAuthors(query) {
  const key = query.toLowerCase().trim();
  if (olAuthorSearchCache.has(key)) return olAuthorSearchCache.get(key);
  try {
    const url = new URL('https://openlibrary.org/search/authors.json');
    url.searchParams.set('q', query);
    url.searchParams.set('limit', '10');
    const resp = await fetch(url);
    if (!resp.ok) return [];
    const j = await resp.json();
    const docs = (j.docs || []).map(d => ({ key: d.key, name: d.name, work_count: d.work_count }));
    olAuthorSearchCache.set(key, docs);
    return docs;
  } catch { return []; }
}

async function olFetchAuthorBooks(author) {
  const key = author.toLowerCase().trim();
  if (olAuthorBookCache.has(key)) return olAuthorBookCache.get(key);
  try {
    const url = new URL('https://openlibrary.org/search.json');
    url.searchParams.set('author', author);
    url.searchParams.set('limit', '40');
    const resp = await fetch(url);
    if (!resp.ok) return [];
    const j = await resp.json();
    const docs = (j.docs || []).map(d => ({
      title: d.title,
      first_publish_year: d.first_publish_year,
      cover_i: d.cover_i,
      coverURL: d.cover_i ? `https://covers.openlibrary.org/b/id/${d.cover_i}-M.jpg` : null
    }));
    olAuthorBookCache.set(key, docs);
    return docs;
  } catch { return []; }
}

function filterAuthorBooks(rawList) {
  const existing = new Set(state.books.map(b => b.title.toLowerCase()));
  return rawList
    .filter(b => !existing.has((b.title || '').toLowerCase()))
    .sort((a, b) => (b.first_publish_year || 0) - (a.first_publish_year || 0));
}

// =====================================================================
// State
// =====================================================================
const state = {
  view: 'signin', // 'signin' | 'main' | 'books'
  books: [],
  loading: false,
  error: null,
  // Books-view UI:
  bookFilter: null,        // null | 'toFind' | 'toRead' | 'read' | 'stopped'
  showFavOnly: false,
  expanded: new Set(),
};
let modal = null;

async function loadBooks() {
  state.loading = true; render();
  try {
    const books = await dbxReadJSON(BOOKS_PATH) || [];
    // Normalise: handle legacy missing fields and migrate "reading" → "toRead"
    state.books = books.map(b => {
      const status = b.status === 'reading' ? 'toRead'
                   : (STATUSES.includes(b.status) ? b.status : 'toFind');
      return {
        id: b.id || cryptoUUID(),
        title: b.title || '',
        author: b.author || '',
        publicationYear: b.publicationYear ?? null,
        coverURL: b.coverURL || null,
        status,
        addedAt: b.addedAt || new Date().toISOString(),
        statusChangedAt: b.statusChangedAt || b.addedAt || new Date().toISOString(),
        isFavourite: !!b.isFavourite
      };
    });
  } catch (e) {
    state.error = e.message;
  } finally {
    state.loading = false;
    render();
  }
}

async function saveBooks() {
  try { await dbxWriteJSON(BOOKS_PATH, state.books); }
  catch (e) { state.error = e.message; render(); }
}

// =====================================================================
// Book operations
// =====================================================================
async function addBook({ title, author, publicationYear, coverURL }) {
  const now = new Date().toISOString();
  state.books.push({
    id: cryptoUUID(),
    title: (title || '').trim(),
    author: (author || '').trim(),
    publicationYear: publicationYear || null,
    coverURL: coverURL || null,
    status: 'toFind',
    addedAt: now,
    statusChangedAt: now,
    isFavourite: false
  });
  await saveBooks(); render();
}

async function setStatus(book, status) {
  const b = state.books.find(x => x.id === book.id);
  if (!b || b.status === status) return;
  b.status = status;
  b.statusChangedAt = new Date().toISOString();
  await saveBooks(); render();
}

async function toggleFavourite(book) {
  const b = state.books.find(x => x.id === book.id);
  if (!b) return;
  b.isFavourite = !b.isFavourite;
  await saveBooks(); render();
}

async function updateBook(original, patch) {
  const b = state.books.find(x => x.id === original.id);
  if (!b) return;
  const titleOrAuthorChanged = patch.title !== b.title || patch.author !== b.author;
  const yearCoverUntouched = patch.publicationYear === b.publicationYear && patch.coverURL === b.coverURL;
  if (b.status !== patch.status) b.statusChangedAt = new Date().toISOString();
  b.title = patch.title.trim();
  b.author = patch.author.trim();
  b.publicationYear = patch.publicationYear || null;
  b.status = patch.status;
  b.isFavourite = !!patch.isFavourite;
  if (titleOrAuthorChanged && yearCoverUntouched) {
    // Refetch from OL
    const list = await olFetchAuthorBooks(b.author);
    const match = list.find(x => x.title.toLowerCase() === b.title.toLowerCase());
    if (match) {
      b.publicationYear = match.first_publish_year || null;
      b.coverURL = match.coverURL || null;
    }
  } else {
    if (patch.publicationYear !== undefined) b.publicationYear = patch.publicationYear || null;
  }
  await saveBooks(); render();
}

async function deleteBook(book) {
  state.books = state.books.filter(b => b.id !== book.id);
  await saveBooks(); render();
}

function countFor(status, favOnly) {
  return state.books.filter(b => b.status === status && (!favOnly || b.isFavourite)).length;
}

function sectionsForRender() {
  let books = state.books;
  if (state.bookFilter) books = books.filter(b => b.status === state.bookFilter);
  if (state.showFavOnly) books = books.filter(b => b.isFavourite);
  const out = [];
  for (const status of STATUSES) {
    const items = books.filter(b => b.status === status);
    if (items.length === 0) continue;
    if (status === 'toFind') items.sort((a, b) => new Date(b.addedAt) - new Date(a.addedAt));
    else items.sort((a, b) => new Date(b.statusChangedAt) - new Date(a.statusChangedAt));
    out.push({ status, items });
  }
  return out;
}

// =====================================================================
// View navigation
// =====================================================================
function goMain() { state.view = 'main'; render(); }
function goBooks() { state.view = 'books'; render(); }

function openModal(node) { modal = node; render(); }
function closeModal() { modal = null; render(); }

// =====================================================================
// DOM helpers
// =====================================================================
function el(tag, cls, ...kids) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  for (const k of kids) {
    if (k == null) continue;
    if (typeof k === 'string' || typeof k === 'number') e.appendChild(document.createTextNode(String(k)));
    else e.appendChild(k);
  }
  return e;
}
function button(cls, text, onclick) {
  const b = el('button', cls, text);
  b.type = 'button';
  if (onclick) b.onclick = onclick;
  return b;
}

// =====================================================================
// Render
// =====================================================================
const root = document.getElementById('app');
function render() {
  root.innerHTML = '';
  let main;
  switch (state.view) {
    case 'signin': main = signInScreen(); break;
    case 'main':   main = mainScreen(); break;
    case 'books':  main = booksScreen(); break;
    default:       main = mainScreen();
  }
  root.appendChild(main);
  if (modal) root.appendChild(modal);
}

// ---- Sign in ----
function signInScreen() {
  const wrap = el('div', 'signin');
  wrap.append(
    el('div', '', '📚'),
    el('h1', '', 'MarXris'),
    el('p', '', 'Your bookshelf, stored in your own Dropbox.'),
    button('primary', 'Connect Dropbox', startSignIn),
    el('div', 'help', '',
      'Register this page as an OAuth Redirect URI in your Dropbox developer app first:',
      el('br'), el('br'),
      el('code', '', REDIRECT_URI)
    )
  );
  if (state.error) wrap.appendChild(el('div', 'err', state.error));
  return wrap;
}

// ---- Main ----
function mainScreen() {
  const wrap = el('div'); wrap.style.display = 'flex'; wrap.style.flexDirection = 'column'; wrap.style.flex = '1';

  const scroll = el('div', 'scroll');
  scroll.appendChild(el('div', 'main-welcome', 'Welcome to MarXris'));

  const grid = el('div', 'main-grid');
  grid.append(
    tile('shopping', '🛒', 'Shopping', null, true),
    tile('expenses', '💳', 'Expenses', null, true),
    tile('books',    '📚', 'Books',    goBooks, false),
    tile('travel',   '🧳', 'Travel',   null, true)
  );
  scroll.appendChild(grid);

  const account = el('div', 'account-card');
  const row = el('div', 'acc-row');
  row.appendChild(el('div', '', '✓ Connected to Dropbox'));
  account.appendChild(row);
  const signOutRow = el('div', 'acc-row');
  signOutRow.appendChild(button('danger', 'Sign Out from Dropbox', signOut));
  account.appendChild(signOutRow);
  scroll.appendChild(account);

  wrap.appendChild(scroll);
  return wrap;
}

function tile(klass, icon, name, onclick, disabled) {
  const t = el('div', `tile ${klass}${disabled ? ' disabled' : ''}`);
  t.append(
    el('div', 'tile-icon', icon),
    el('div', 'tile-name', name)
  );
  if (!disabled && onclick) t.onclick = onclick;
  if (disabled) t.title = 'Coming soon';
  return t;
}

// ---- Books ----
function booksScreen() {
  const wrap = el('div'); wrap.style.display = 'flex'; wrap.style.flexDirection = 'column'; wrap.style.flex = '1';

  const nav = el('div', 'nav');
  nav.append(
    el('div', 'ghost'),
    el('div', 'nav-title', 'Book Shelf'),
    button('icon', state.showFavOnly ? '★' : '☆', () => {
      state.showFavOnly = !state.showFavOnly; render();
    }),
    button('icon', '＋', () => openAddBookModal())
  );
  wrap.appendChild(nav);

  const scroll = el('div', 'scroll');

  // Filter pills
  const filterRow = el('div', 'filter-row');
  STATUSES.forEach(status => {
    const pill = el('button', `pill ${status}${state.bookFilter === status ? ' active' : ''}`);
    pill.append(
      el('span', '', STATUS_LABEL[status]),
      el('span', 'count', String(countFor(status, state.showFavOnly)))
    );
    pill.onclick = () => {
      state.bookFilter = state.bookFilter === status ? null : status;
      render();
    };
    filterRow.appendChild(pill);
  });
  scroll.appendChild(filterRow);

  // Sections
  const sections = sectionsForRender();
  if (sections.length === 0) {
    scroll.appendChild(el('div', 'empty',
      el('div', 'e-icon', '📚'),
      el('div', '', el('strong', '', state.showFavOnly ? 'No Favourites' : 'No Books')),
      el('div', '', state.showFavOnly ? 'Tap a star to add favourites.' : 'Tap + to add one.')
    ));
  } else {
    const shelf = el('div', 'shelf');
    for (const sec of sections) {
      shelf.appendChild(el('div', `shelf-section-title ${sec.status}`, STATUS_LABEL[sec.status]));
      for (const b of sec.items) shelf.appendChild(bookCard(b));
    }
    scroll.appendChild(shelf);
  }
  wrap.appendChild(scroll);

  // Bottom: Main link only
  const bottom = el('div', 'bottombar');
  bottom.appendChild(button('', '🏠 Main', goMain));
  wrap.appendChild(bottom);
  return wrap;
}

function coverElement(book, size = '') {
  const c = el('div', `cover ${size}`);
  c.style.background = placeholderColor(book.title || '');
  c.textContent = firstThreeWords(book.title || '');
  if (book.coverURL) {
    const img = new Image();
    img.onload = () => {
      c.textContent = '';
      c.style.backgroundImage = `url(${book.coverURL})`;
      c.style.backgroundColor = 'transparent';
    };
    img.onerror = () => { /* keep placeholder */ };
    img.src = book.coverURL;
  }
  return c;
}

function bookCard(book) {
  const card = el('div', 'book-card');
  card.appendChild(coverElement(book));

  const info = el('div', 'book-info');
  const titleRow = el('div', '');
  const titleBtn = el('span', 'book-title', book.title);
  titleBtn.onclick = () => openEditBookModal(book);
  titleRow.appendChild(titleBtn);
  if (book.publicationYear) titleRow.appendChild(el('span', 'book-year', `(${book.publicationYear})`));
  info.appendChild(titleRow);
  if (book.author) info.appendChild(el('div', 'book-author', book.author));

  const actions = el('div', 'book-actions');
  // Status controls
  if (book.status === 'toFind' || book.status === 'toRead') {
    for (const adv of ADVANCES[book.status]) {
      const b = button(`btn advance ${adv.to}`, adv.label, () => setStatus(book, adv.to));
      actions.appendChild(b);
    }
  } else if (book.status === 'read' || book.status === 'stopped') {
    actions.appendChild(el('span', `date-pill ${book.status}`, ddMmYyyy(book.statusChangedAt)));
  }
  // More toggle (only useful if author known)
  if (book.author) {
    const isOpen = state.expanded.has(book.id);
    const m = button('btn more', isOpen ? 'Less ▲' : 'More… ▾', () => {
      if (isOpen) state.expanded.delete(book.id); else state.expanded.add(book.id);
      render();
    });
    actions.appendChild(m);
  }
  info.appendChild(actions);
  card.appendChild(info);

  // Right column: ×, ★
  const side = el('div', 'book-side');
  const del = button('icon-btn', '✕', () => {
    if (confirm(`Delete "${book.title}"?`)) deleteBook(book);
  });
  side.appendChild(del);
  if (book.status === 'toRead' || book.status === 'read') {
    const st = button('icon-btn star' + (book.isFavourite ? ' on' : ''), book.isFavourite ? '★' : '☆', () => toggleFavourite(book));
    side.appendChild(st);
  }
  card.appendChild(side);

  // More panel content (rendered below the card row)
  if (state.expanded.has(book.id) && book.author) {
    const panel = el('div', 'more-panel');
    panel.style.flexBasis = '100%';
    renderMorePanel(panel, book);
    card.style.flexWrap = 'wrap';
    card.appendChild(panel);
  }
  return card;
}

async function renderMorePanel(panel, book) {
  let results = olAuthorBookCache.get(book.author.toLowerCase().trim());
  if (results) {
    drawMorePanel(panel, book, filterAuthorBooks(results));
    return;
  }
  panel.appendChild(el('div', 'more-loading', `Loading other books by ${book.author}…`));
  const list = await olFetchAuthorBooks(book.author);
  panel.innerHTML = '';
  drawMorePanel(panel, book, filterAuthorBooks(list));
}

function drawMorePanel(panel, book, list) {
  if (list.length === 0) {
    panel.appendChild(el('div', 'more-loading', 'No other books found.'));
    return;
  }
  for (const r of list) {
    const row = el('div', 'more-row');
    row.appendChild(coverElement({ title: r.title, coverURL: r.coverURL }, 'sm'));
    const info = el('div', '');
    info.style.flex = '1'; info.style.minWidth = '0';
    info.append(
      el('div', '', r.title),
      r.first_publish_year ? el('div', 'book-author', String(r.first_publish_year)) : null
    );
    row.appendChild(info);
    const addBtn = el('span', 'add', '+ Add');
    addBtn.onclick = async () => {
      await addBook({
        title: r.title,
        author: book.author,
        publicationYear: r.first_publish_year || null,
        coverURL: r.coverURL || null
      });
    };
    row.appendChild(addBtn);
    panel.appendChild(row);
  }
}

// ---- Add Book modal ----
function openAddBookModal() {
  let author = '', title = '';
  let selectedAuthor = null;
  let authorOLResults = [];
  let prefetchedBooks = [];

  const backdrop = el('div', 'modal-backdrop');
  const m = el('div', 'modal');

  const nav = el('div', 'nav'); nav.style.position = 'relative';
  nav.append(
    button('', 'Cancel', () => { backdrop.remove(); closeModal(); }),
    el('div', 'nav-title', 'Add Book'),
    el('div', 'ghost')
  );
  m.appendChild(nav);

  const fieldPair = el('div', 'field-pair');
  const authorInput = el('input'); authorInput.type = 'text'; authorInput.placeholder = 'Author';
  const titleInput = el('input'); titleInput.type = 'text'; titleInput.placeholder = 'Title';
  fieldPair.append(authorInput, titleInput);
  m.appendChild(fieldPair);

  const tip = el('div', 'helper-tip', 'Type an author to search Open Library, pick one, then a title.');
  m.appendChild(tip);

  const dd = el('div', 'dropdown');
  m.appendChild(dd);

  const debouncedAuthorSearch = debounce(async (q) => {
    if (q.trim().length < 2) { authorOLResults = []; renderDropdown(); return; }
    const known = state.books.find(b => b.author.toLowerCase() === q.trim().toLowerCase());
    if (known) {
      // No new search needed, but we'll still show the OL author search for breadth.
    }
    const ol = await olSearchAuthors(q.trim());
    authorOLResults = ol;
    renderDropdown();
  }, 400);

  authorInput.addEventListener('input', () => {
    author = authorInput.value;
    if (selectedAuthor && author.trim().toLowerCase() !== selectedAuthor.toLowerCase()) {
      selectedAuthor = null; prefetchedBooks = [];
    }
    debouncedAuthorSearch(author);
    renderDropdown();
  });
  titleInput.addEventListener('input', () => { title = titleInput.value; renderDropdown(); });
  titleInput.addEventListener('focus', () => { renderDropdown(); });
  authorInput.addEventListener('focus', () => { renderDropdown(); });

  async function selectAuthor(name) {
    selectedAuthor = name;
    authorInput.value = name;
    author = name;
    titleInput.focus();
    const list = olAuthorBookCache.get(name.toLowerCase().trim()) || await olFetchAuthorBooks(name);
    prefetchedBooks = filterAuthorBooks(list);
    renderDropdown();
  }

  function renderDropdown() {
    dd.innerHTML = '';
    const active = document.activeElement === titleInput ? 'title' : 'author';
    if (active === 'author' || !selectedAuthor) {
      // Show author suggestions (library + OL)
      const libraryAuthors = [...new Set(state.books.map(b => b.author).filter(Boolean))]
        .filter(a => a.toLowerCase().includes(author.trim().toLowerCase()))
        .slice(0, 5);
      const seen = new Set();
      for (const a of libraryAuthors) {
        seen.add(a.toLowerCase());
        const row = el('div', 'dd-row tap');
        row.append(el('span', 'src', '📚'), el('span', 'name', a));
        row.onclick = () => selectAuthor(a);
        dd.appendChild(row);
      }
      for (const a of authorOLResults) {
        if (seen.has(a.name.toLowerCase())) continue;
        const row = el('div', 'dd-row tap');
        row.append(
          el('span', 'src', '🔍'),
          el('span', 'name', a.name),
          a.work_count ? el('span', 'meta', `· ${a.work_count} works`) : null
        );
        row.onclick = () => selectAuthor(a.name);
        dd.appendChild(row);
      }
    } else if (active === 'title' && selectedAuthor) {
      const q = title.trim().toLowerCase();
      let books = prefetchedBooks;
      if (q) books = books.filter(b => (b.title || '').toLowerCase().includes(q));
      books = books.slice(0, 20);
      if (books.length === 0) {
        dd.appendChild(el('div', 'more-loading', 'No matching titles.'));
      }
      for (const b of books) {
        const row = el('div', 'dd-row tap');
        row.append(
          coverElement({ title: b.title, coverURL: b.coverURL }, 'sm'),
          el('span', 'name', b.title),
          b.first_publish_year ? el('span', 'meta', String(b.first_publish_year)) : null,
          el('span', 'plus', '+')
        );
        row.onclick = async () => {
          await addBook({
            title: b.title, author: selectedAuthor,
            publicationYear: b.first_publish_year || null,
            coverURL: b.coverURL || null
          });
          backdrop.remove(); closeModal();
        };
        dd.appendChild(row);
      }
    }
  }
  renderDropdown();

  backdrop.appendChild(m);
  backdrop.onclick = (e) => { if (e.target === backdrop) { backdrop.remove(); closeModal(); } };
  openModal(backdrop);
  setTimeout(() => authorInput.focus(), 0);
}

// ---- Edit Book modal ----
function openEditBookModal(book) {
  const draft = {
    title: book.title, author: book.author,
    publicationYear: book.publicationYear,
    status: book.status, isFavourite: book.isFavourite, coverURL: book.coverURL
  };
  const backdrop = el('div', 'modal-backdrop');
  const m = el('div', 'modal');

  const nav = el('div', 'nav'); nav.style.position = 'relative';
  nav.append(
    button('', 'Cancel', () => { backdrop.remove(); closeModal(); }),
    el('div', 'nav-title', 'Edit Book'),
    button('', 'Save', async () => {
      if (!draft.title.trim()) return;
      await updateBook(book, draft);
      backdrop.remove(); closeModal();
    })
  );
  m.appendChild(nav);

  const form = el('div', 'form');

  const sBook = el('div', 'form-section');
  sBook.appendChild(el('h3', '', 'Book'));
  const titleIn = el('input'); titleIn.type = 'text'; titleIn.value = draft.title; titleIn.placeholder = 'Title';
  titleIn.addEventListener('input', () => draft.title = titleIn.value);
  const authIn = el('input'); authIn.type = 'text'; authIn.value = draft.author; authIn.placeholder = 'Author';
  authIn.addEventListener('input', () => draft.author = authIn.value);
  const yearIn = el('input'); yearIn.type = 'number'; yearIn.value = draft.publicationYear || ''; yearIn.placeholder = 'Year';
  yearIn.addEventListener('input', () => draft.publicationYear = parseInt(yearIn.value) || null);
  sBook.appendChild(el('div', 'form-row', titleIn));
  sBook.appendChild(el('div', 'form-row', authIn));
  sBook.appendChild(el('div', 'form-row', yearIn));
  form.appendChild(sBook);

  // Status + Favourite
  const sStatus = el('div', 'form-section');
  sStatus.appendChild(el('h3', '', 'Status'));
  const seg = el('div', 'seg picker-row');
  STATUSES.forEach(s => {
    const b = el('button', '', STATUS_LABEL[s]);
    if (s === draft.status) b.classList.add('on');
    b.onclick = () => { draft.status = s; [...seg.children].forEach(c => c.classList.remove('on')); b.classList.add('on'); };
    seg.appendChild(b);
  });
  sStatus.appendChild(seg);
  // Favourite toggle
  const favRow = el('div', 'toggle-row');
  favRow.append(el('span', '', 'Favourite'));
  const sw = el('div', 'switch' + (draft.isFavourite ? ' on' : ''));
  sw.onclick = () => { draft.isFavourite = !draft.isFavourite; sw.classList.toggle('on'); };
  favRow.appendChild(sw);
  sStatus.appendChild(favRow);
  form.appendChild(sStatus);

  // Dates (read-only)
  const sDates = el('div', 'form-section');
  sDates.appendChild(el('h3', '', 'Dates'));
  const added = el('div', 'dates-row');
  added.append(el('span', '', 'Added'), el('span', '', ddMmYyyy(book.addedAt)));
  const modified = el('div', 'dates-row');
  modified.append(el('span', '', 'Modified'), el('span', '', ddMmYyyy(book.statusChangedAt)));
  sDates.append(added, modified);
  form.appendChild(sDates);

  m.appendChild(form);
  backdrop.appendChild(m);
  backdrop.onclick = (e) => { if (e.target === backdrop) { backdrop.remove(); closeModal(); } };
  openModal(backdrop);
}

// =====================================================================
// Boot
// =====================================================================
(async function boot() {
  try {
    const url = new URL(window.location.href);
    const code = url.searchParams.get('code');
    if (code) {
      try {
        state.loading = true; render();
        await exchangeAuthCode(code);
        url.searchParams.delete('code');
        url.searchParams.delete('state');
        window.history.replaceState({}, '', url.pathname + (url.search ? '?' + url.searchParams.toString() : ''));
      } catch (e) {
        state.error = e.message;
      } finally {
        state.loading = false;
      }
    }
    if (loadRefreshToken()) {
      state.view = 'main';
      render();
      await loadBooks();
    } else {
      state.view = 'signin';
      render();
    }
  } catch (e) {
    state.error = e.message; render();
  }
})();

})();
</script>
