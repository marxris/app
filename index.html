<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>MarXris — Shopping</title>
<style>
  :root {
    --bg: #f2f2f7;
    --bg-elev: #ffffff;
    --bg-soft: #e5e5ea;
    --bg-tert: #d1d1d6;
    --tint: #007aff;
    --tint-soft: rgba(0, 122, 255, 0.14);
    --green: #34c759;
    --red: #ff3b30;
    --orange: #ff9500;
    --gray: #8e8e93;
    --text: #000;
    --text-2: #6c6c70;
    --radius: 12px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bot: env(safe-area-inset-bottom, 0px);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #000;
      --bg-elev: #1c1c1e;
      --bg-soft: #2c2c2e;
      --bg-tert: #3a3a3c;
      --tint-soft: rgba(10, 132, 255, 0.22);
      --tint: #0a84ff;
      --text: #fff;
      --text-2: #98989d;
      --gray: #8e8e93;
    }
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text);
    font: 16px -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
    -webkit-tap-highlight-color: transparent;
  }
  button { font: inherit; color: inherit; background: none; border: 0; padding: 0; cursor: pointer; }
  input, select, textarea { font: inherit; color: inherit; }
  #app { min-height: 100%; display: flex; flex-direction: column; }

  /* Nav bar */
  .nav {
    position: sticky; top: 0; z-index: 10;
    padding: calc(var(--safe-top) + 6px) 12px 6px;
    display: flex; align-items: center; gap: 8px;
    background: color-mix(in srgb, var(--bg) 92%, transparent);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
  }
  .nav-title { font-size: 17px; font-weight: 600; flex: 1; text-align: center; }
  .nav button { color: var(--tint); font-size: 16px; padding: 6px; min-width: 32px; }
  .nav button.icon { font-size: 22px; line-height: 1; }
  .nav .ghost { width: 32px; }

  /* Layout */
  .scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: calc(var(--safe-bot) + 24px); }
  .group-list { padding: 12px; display: flex; flex-direction: column; gap: 16px; }
  .section-card { background: var(--bg-elev); border-radius: var(--radius); overflow: hidden; }
  .section-title { padding: 4px 16px; font-size: 13px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--text-2); display: flex; align-items: center; gap: 6px; }
  .row {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px; min-height: 44px;
    border-top: 1px solid var(--bg-soft);
  }
  .row:first-child { border-top: 0; }
  .row .grow { flex: 1; min-width: 0; }
  .row.tap { cursor: pointer; }
  .row.tap:active { background: var(--bg-soft); }
  .row .icon { width: 28px; text-align: center; font-size: 20px; }
  .row .chev { color: var(--gray); font-size: 18px; }
  .muted { color: var(--text-2); font-size: 13px; }
  .subtle { color: var(--text-2); font-size: 11px; }

  /* Sign in */
  .signin {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 18px; padding: 24px; text-align: center;
  }
  .signin h1 { margin: 0; font-size: 34px; font-weight: 800; letter-spacing: -0.02em; }
  .signin p { color: var(--text-2); max-width: 28em; line-height: 1.4; }
  .primary {
    background: var(--tint); color: #fff; font-weight: 600;
    padding: 14px 22px; border-radius: 14px; min-width: 240px;
  }
  .primary:active { opacity: 0.85; }
  .help { font-size: 12px; color: var(--text-2); max-width: 32em; line-height: 1.5; }
  .help code { background: var(--bg-soft); padding: 1px 6px; border-radius: 4px; font-size: 11px; }

  /* Shop rows */
  .shop-emoji {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--bg-tert); display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex: 0 0 36px;
  }

  /* Items */
  .item-row .check { width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--gray); display: flex; align-items: center; justify-content: center; flex: 0 0 28px; }
  .item-row .check.on { background: var(--green); border-color: var(--green); color: #fff; }
  .item-row .thumb { width: 36px; height: 36px; border-radius: 6px; background: var(--bg-tert); flex: 0 0 36px; background-size: cover; background-position: center; cursor: zoom-in; }
  .item-row .name { flex: 1; min-width: 0; }
  .item-row.checked .name { text-decoration: line-through; color: var(--text-2); }
  .item-row .qty { background: var(--bg-tert); color: var(--text-2); border-radius: 999px; padding: 3px 8px; font-size: 12px; font-weight: 500; }
  .item-row.swipe { position: relative; }

  /* Add bar */
  .addbar {
    position: sticky; bottom: 0;
    background: color-mix(in srgb, var(--bg) 92%, transparent);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    padding: 8px 12px calc(8px + var(--safe-bot));
    display: flex; gap: 8px; align-items: center;
    border-top: 1px solid var(--bg-soft);
  }
  .addbar input.name { flex: 1; min-width: 0; padding: 10px 12px; border-radius: 10px; border: 1px solid var(--bg-tert); background: var(--bg-elev); }
  .addbar .cat-pick {
    padding: 8px 12px; border-radius: 999px; background: var(--bg-tert); display: flex; align-items: center; gap: 4px; font-size: 12px; max-width: 160px;
  }
  .addbar .cat-pick select {
    appearance: none; background: transparent; border: 0; padding: 0; padding-right: 2px;
    max-width: 120px; text-overflow: ellipsis; overflow: hidden; white-space: nowrap;
  }
  .addbar .plus {
    width: 36px; height: 36px; border-radius: 50%;
    color: var(--tint); display: flex; align-items: center; justify-content: center; font-size: 28px;
  }
  .addbar .plus[disabled] { color: var(--gray); cursor: default; }

  /* Suggestions */
  .suggestions {
    overflow-x: auto; display: flex; gap: 8px; padding: 8px 12px;
    border-top: 1px solid var(--bg-soft); background: var(--bg-elev);
  }
  .sugg-chip {
    flex: 0 0 auto; padding: 6px 12px; border-radius: 999px; background: var(--bg-soft);
    display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 500;
  }
  .sugg-chip .thumb { width: 22px; height: 22px; border-radius: 4px; background-size: cover; background-position: center; }
  .sugg-chip .q { color: var(--text-2); }

  /* Modal */
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.45);
    display: flex; align-items: flex-end; justify-content: center;
    z-index: 30;
  }
  .modal {
    background: var(--bg); width: 100%; max-width: 560px;
    max-height: 92vh; display: flex; flex-direction: column;
    border-radius: 14px 14px 0 0;
    padding-bottom: var(--safe-bot);
  }
  .modal .nav { position: relative; }

  /* Form */
  .form { padding: 12px; display: flex; flex-direction: column; gap: 16px; }
  .form-section { background: var(--bg-elev); border-radius: var(--radius); overflow: hidden; }
  .form-section h3 { margin: 0; padding: 8px 16px; font-size: 12px; text-transform: uppercase; color: var(--text-2); font-weight: 500; letter-spacing: 0.04em; }
  .form-row { padding: 12px 16px; display: flex; align-items: center; gap: 12px; border-top: 1px solid var(--bg-soft); }
  .form-row:first-of-type { border-top: 0; }
  .form-row input[type=text], .form-row input[type=number] {
    flex: 1; padding: 10px 12px; border-radius: 10px; border: 1px solid var(--bg-tert); background: var(--bg);
  }
  .seg { display: flex; gap: 4px; }
  .seg button {
    padding: 6px 10px; border-radius: 8px; background: var(--bg-soft); color: var(--text);
    font-weight: 500; font-size: 13px;
  }
  .seg button.on { background: var(--tint); color: #fff; }

  /* Icon grid */
  .icon-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(52px, 1fr)); gap: 10px; padding: 12px 16px; }
  .icon-cell {
    width: 44px; height: 44px; border-radius: 8px; background: var(--bg-soft);
    display: flex; align-items: center; justify-content: center; font-size: 22px;
    margin: 0 auto;
    border: 2px solid transparent;
  }
  .icon-cell.on { background: var(--tint-soft); border-color: var(--tint); }

  /* History grid */
  .hist-filter-row { display: flex; gap: 8px; padding: 8px 12px; overflow-x: auto; background: var(--bg-elev); border-bottom: 1px solid var(--bg-soft); }
  .hist-chip {
    width: 40px; height: 40px; border-radius: 50%; background: var(--bg-soft);
    display: flex; align-items: center; justify-content: center; font-size: 20px; flex: 0 0 40px;
  }
  .hist-chip.on { background: var(--tint); color: #fff; }
  .hist-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 12px; }
  .hist-cell {
    padding: 10px; border-radius: 10px; display: flex; flex-direction: column; gap: 4px;
    cursor: pointer; transition: opacity 0.15s;
  }
  .hist-cell.available {
    background: var(--tint-soft); color: var(--tint);
  }
  .hist-cell.added {
    background: var(--bg-tert); color: var(--text-2); cursor: default;
  }
  .hist-cell .h-name { font-weight: 500; font-size: 14px; }
  .hist-cell .h-qty { font-size: 11px; color: var(--text-2); }

  /* Misc */
  .empty {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 8px; color: var(--text-2); padding: 24px; text-align: center;
  }
  .empty .e-icon { font-size: 48px; opacity: 0.5; }
  .swipe-del {
    background: var(--red); color: #fff; padding: 0 16px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 500;
  }
  .toolbar-icon { font-size: 22px; }

  /* List operations (edit/delete categories) */
  .cat-row { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-top: 1px solid var(--bg-soft); }
  .cat-row:first-child { border-top: 0; }
  .cat-row .del { color: var(--red); font-weight: 500; }
  .photo-pick { display: flex; align-items: center; gap: 12px; }
  .photo-pick .preview {
    width: 60px; height: 60px; border-radius: 8px; background: var(--bg-tert); background-size: cover; background-position: center;
    display: flex; align-items: center; justify-content: center; font-size: 24px; color: var(--gray);
  }
  .link { color: var(--tint); font-weight: 500; }
  .danger-link { color: var(--red); font-weight: 500; font-size: 13px; }
  .err { color: var(--red); font-size: 13px; padding: 6px 12px; }
</style>
</head>
<body>
<div id="app"></div>
<script>
(() => {
'use strict';

// =====================================================================
// Config
// =====================================================================
const APP_KEY = '6c8d4is46ktgahy';
const REDIRECT_URI = window.location.origin + window.location.pathname;

// =====================================================================
// SF Symbol name → emoji (so iOS + web read the same JSON consistently)
// =====================================================================
const ICONS = {
  'cart': '🛒', 'basket': '🧺', 'carrot': '🥕', 'fork.knife': '🍴', 'fish': '🐟',
  'wineglass': '🍷', 'mug': '☕', 'birthday.cake': '🎂', 'drop': '💧', 'leaf': '🌿',
  'snowflake': '❄️', 'pills': '💊', 'heart': '❤️', 'house': '🏠', 'bubbles.and.sparkles': '🫧',
  'tshirt': '👕', 'pawprint': '🐾', 'flower': '🌸', 'lightbulb': '💡', 'gift': '🎁',
  'sparkles': '✨', 'cylinder.fill': '🥫', 'milk': '🥛', 'flame.fill': '🔥', 'popcorn.fill': '🍞'
};
const ALL_ICONS = Object.keys(ICONS);
const DEFAULT_ICON = 'cart';
const UNCAT = '—';

const DEFAULT_CATEGORIES = [
  { id: cryptoUUID(), name: 'Produce',     icon: 'carrot' },
  { id: cryptoUUID(), name: 'Dairy',       icon: 'drop' },
  { id: cryptoUUID(), name: 'Meat & Fish', icon: 'fish' },
  { id: cryptoUUID(), name: 'Bakery',      icon: 'birthday.cake' },
  { id: cryptoUUID(), name: 'Pantry',      icon: 'basket' },
  { id: cryptoUUID(), name: 'Frozen',      icon: 'snowflake' },
  { id: cryptoUUID(), name: 'Beverages',   icon: 'mug' },
  { id: cryptoUUID(), name: 'Household',   icon: 'house' }
];

const UNIT_SYMBOL = { count: '×', gram: 'g', kilo: 'kg' };

// =====================================================================
// Utilities
// =====================================================================
function cryptoUUID() {
  if (crypto.randomUUID) return crypto.randomUUID();
  const b = crypto.getRandomValues(new Uint8Array(16));
  b[6] = (b[6] & 0x0f) | 0x40; b[8] = (b[8] & 0x3f) | 0x80;
  const hex = [...b].map(x => x.toString(16).padStart(2, '0')).join('');
  return `${hex.slice(0,8)}-${hex.slice(8,12)}-${hex.slice(12,16)}-${hex.slice(16,20)}-${hex.slice(20)}`;
}
function base64url(buf) {
  return btoa(String.fromCharCode(...new Uint8Array(buf)))
    .replaceAll('+', '-').replaceAll('/', '_').replaceAll('=', '');
}
async function sha256(str) {
  return crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
}
function randomVerifier() {
  const bytes = crypto.getRandomValues(new Uint8Array(64));
  return base64url(bytes);
}
function quantityDisplay(q) {
  const s = (q.amount === Math.floor(q.amount)) ? String(q.amount) : String(q.amount);
  if (q.unit === 'count') return `${UNIT_SYMBOL[q.unit]}${s}`;
  return `${s}${UNIT_SYMBOL[q.unit]}`;
}
function dataURLFromBase64Jpeg(b64) {
  return `data:image/jpeg;base64,${b64}`;
}
async function resizeImageToBase64(file, maxSide = 800, quality = 0.7) {
  const dataUrl = await new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
  const img = await new Promise((res, rej) => {
    const i = new Image();
    i.onload = () => res(i);
    i.onerror = rej;
    i.src = dataUrl;
  });
  const max = Math.max(img.width, img.height);
  const scale = max > maxSide ? maxSide / max : 1;
  const w = Math.round(img.width * scale);
  const h = Math.round(img.height * scale);
  const canvas = document.createElement('canvas');
  canvas.width = w; canvas.height = h;
  canvas.getContext('2d').drawImage(img, 0, 0, w, h);
  const jpegUrl = canvas.toDataURL('image/jpeg', quality);
  return jpegUrl.split(',', 2)[1];
}

// =====================================================================
// Storage of refresh token
// =====================================================================
const TOKEN_KEY = 'dropbox.refreshToken';
function saveRefreshToken(t) { localStorage.setItem(TOKEN_KEY, t); }
function loadRefreshToken() { return localStorage.getItem(TOKEN_KEY); }
function clearRefreshToken() { localStorage.removeItem(TOKEN_KEY); }

// =====================================================================
// Dropbox auth (PKCE)
// =====================================================================
let accessToken = null;
let accessTokenExp = 0;

async function startSignIn() {
  const verifier = randomVerifier();
  const challenge = base64url(await sha256(verifier));
  sessionStorage.setItem('pkce.verifier', verifier);
  const params = new URLSearchParams({
    client_id: APP_KEY,
    response_type: 'code',
    code_challenge: challenge,
    code_challenge_method: 'S256',
    token_access_type: 'offline',
    redirect_uri: REDIRECT_URI
  });
  window.location.href = `https://www.dropbox.com/oauth2/authorize?${params}`;
}

async function exchangeAuthCode(code) {
  const verifier = sessionStorage.getItem('pkce.verifier');
  sessionStorage.removeItem('pkce.verifier');
  if (!verifier) throw new Error('Missing PKCE verifier — start sign-in from this device.');
  const body = new URLSearchParams({
    code,
    grant_type: 'authorization_code',
    client_id: APP_KEY,
    redirect_uri: REDIRECT_URI,
    code_verifier: verifier
  });
  const resp = await fetch('https://api.dropboxapi.com/oauth2/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body
  });
  if (!resp.ok) throw new Error('Token exchange failed: ' + await resp.text());
  const j = await resp.json();
  accessToken = j.access_token;
  accessTokenExp = Date.now() + (j.expires_in - 60) * 1000;
  if (j.refresh_token) saveRefreshToken(j.refresh_token);
}

async function refreshAccessToken() {
  const refresh = loadRefreshToken();
  if (!refresh) throw new Error('Not authenticated.');
  const body = new URLSearchParams({
    grant_type: 'refresh_token',
    refresh_token: refresh,
    client_id: APP_KEY
  });
  const resp = await fetch('https://api.dropboxapi.com/oauth2/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body
  });
  if (!resp.ok) { clearRefreshToken(); throw new Error('Refresh failed: ' + await resp.text()); }
  const j = await resp.json();
  accessToken = j.access_token;
  accessTokenExp = Date.now() + (j.expires_in - 60) * 1000;
}

async function ensureAccessToken() {
  if (accessToken && Date.now() < accessTokenExp) return accessToken;
  await refreshAccessToken();
  return accessToken;
}

function signOut() {
  clearRefreshToken();
  accessToken = null;
  state.shops = []; state.categories = []; state.history = []; state.account = null;
  go({ view: 'signin' });
}

// =====================================================================
// Dropbox JSON read/write
// =====================================================================
async function dbxReadJSON(path) {
  const token = await ensureAccessToken();
  const resp = await fetch('https://content.dropboxapi.com/2/files/download', {
    method: 'POST',
    headers: {
      'Authorization': `Bearer ${token}`,
      'Dropbox-API-Arg': JSON.stringify({ path })
    }
  });
  if (resp.status === 409) return null; // path not found
  if (!resp.ok) throw new Error('Download failed: ' + await resp.text());
  const text = await resp.text();
  return JSON.parse(text);
}

async function dbxCurrentAccount() {
  const token = await ensureAccessToken();
  const resp = await fetch('https://api.dropboxapi.com/2/users/get_current_account', {
    method: 'POST',
    headers: { 'Authorization': `Bearer ${token}` }
  });
  if (!resp.ok) return null;
  return resp.json();
}

async function dbxWriteJSON(path, value) {
  const token = await ensureAccessToken();
  const body = JSON.stringify(value, null, 2);
  const arg = { path, mode: 'overwrite', autorename: false, mute: true, strict_conflict: false };
  const resp = await fetch('https://content.dropboxapi.com/2/files/upload', {
    method: 'POST',
    headers: {
      'Authorization': `Bearer ${token}`,
      'Content-Type': 'application/octet-stream',
      'Dropbox-API-Arg': JSON.stringify(arg)
    },
    body
  });
  if (!resp.ok) throw new Error('Upload failed: ' + await resp.text());
}

// =====================================================================
// State + persistence
// =====================================================================
const state = {
  shops: [],
  categories: [],
  history: [],
  account: null,
  view: 'signin',
  shopId: null,
  loading: false,
  error: null
};

const PATHS = {
  shops: '/shopping/shops.json',
  categories: '/shopping/categories.json',
  history: '/shopping/history.json'
};

async function loadAll() {
  state.loading = true; render();
  try {
    const [shops, cats, history, account] = await Promise.all([
      dbxReadJSON(PATHS.shops),
      dbxReadJSON(PATHS.categories),
      dbxReadJSON(PATHS.history),
      dbxCurrentAccount()
    ]);
    state.shops = shops || [];
    state.categories = (cats || DEFAULT_CATEGORIES).map(normaliseCategory);
    state.history = (history || []).sort((a, b) => new Date(b.lastUsedAt) - new Date(a.lastUsedAt));
    state.account = account;
  } catch (e) {
    state.error = e.message;
  } finally {
    state.loading = false; render();
  }
}

// Some legacy categories may be bare strings — keep compatible with the iOS app.
function normaliseCategory(c) {
  if (typeof c === 'string') return { id: cryptoUUID(), name: c, icon: DEFAULT_ICON };
  return { id: c.id || cryptoUUID(), name: c.name, icon: c.icon || DEFAULT_ICON };
}

async function saveShops()      { await dbxWriteJSON(PATHS.shops, state.shops); }
async function saveCategories() { await dbxWriteJSON(PATHS.categories, state.categories); }
async function saveHistory()    { await dbxWriteJSON(PATHS.history, state.history); }

// =====================================================================
// Domain operations
// =====================================================================
function shopById(id) { return state.shops.find(s => s.id === id); }

async function addShop(name, emoji) {
  const trimmed = name.trim(); if (!trimmed) return;
  state.shops.push({ id: cryptoUUID(), name: trimmed, emoji: emoji || '🛒', items: [] });
  await saveShops(); render();
}
async function deleteShop(id) {
  state.shops = state.shops.filter(s => s.id !== id);
  await saveShops(); render();
}
async function addItem(shopId, item) {
  const shop = shopById(shopId); if (!shop) return;
  shop.items.push(item);
  await saveShops(); render();
}
async function updateItem(shopId, updated) {
  const shop = shopById(shopId); if (!shop) return;
  const idx = shop.items.findIndex(i => i.id === updated.id);
  if (idx < 0) return;
  shop.items[idx] = updated;
  await saveShops(); render();
}
async function deleteItem(shopId, itemId) {
  const shop = shopById(shopId); if (!shop) return;
  shop.items = shop.items.filter(i => i.id !== itemId);
  await saveShops(); render();
}
async function toggleItem(shopId, itemId) {
  const shop = shopById(shopId); if (!shop) return;
  const item = shop.items.find(i => i.id === itemId);
  if (!item) return;
  item.isChecked = !item.isChecked;
  if (item.isChecked) upsertHistory(item);
  await saveShops();
  if (item.isChecked) await saveHistory();
  render();
}
async function clearChecked(shopId) {
  const shop = shopById(shopId); if (!shop) return;
  for (const it of shop.items.filter(i => i.isChecked)) upsertHistory(it);
  shop.items = shop.items.filter(i => !i.isChecked);
  await saveShops(); await saveHistory(); render();
}
function upsertHistory(item) {
  const key = item.name.trim().toLowerCase();
  const entry = {
    name: item.name.trim(),
    quantity: item.quantity,
    category: item.category || null,
    photo: item.photo || null,
    lastUsedAt: new Date().toISOString()
  };
  const idx = state.history.findIndex(h => h.name.toLowerCase() === key);
  if (idx >= 0) state.history[idx] = entry; else state.history.push(entry);
  state.history.sort((a, b) => new Date(b.lastUsedAt) - new Date(a.lastUsedAt));
}
async function addFromPrevious(shopId, prev) {
  const item = {
    id: cryptoUUID(), name: prev.name, quantity: prev.quantity,
    category: prev.category || null, photo: prev.photo || null, isChecked: false
  };
  await addItem(shopId, item);
}

// Categories
async function addCategory(name, icon) {
  const trimmed = name.trim(); if (!trimmed) return;
  if (state.categories.some(c => c.name.toLowerCase() === trimmed.toLowerCase())) return;
  state.categories.push({ id: cryptoUUID(), name: trimmed, icon });
  await saveCategories(); render();
}
async function updateCategory(original, newName, newIcon) {
  const trimmed = newName.trim(); if (!trimmed) return;
  const idx = state.categories.findIndex(c => c.id === original.id);
  if (idx < 0) return;
  const oldName = state.categories[idx].name;
  if (state.categories.some(c => c.id !== original.id && c.name.toLowerCase() === trimmed.toLowerCase())) return;
  state.categories[idx] = { ...state.categories[idx], name: trimmed, icon: newIcon };
  if (oldName !== trimmed) {
    for (const s of state.shops) for (const it of s.items) {
      if (it.category === oldName) it.category = trimmed;
    }
    for (const h of state.history) if (h.category === oldName) h.category = trimmed;
    await saveShops(); await saveHistory();
  }
  await saveCategories(); render();
}
async function deleteCategory(cat) {
  state.categories = state.categories.filter(c => c.id !== cat.id);
  for (const s of state.shops) for (const it of s.items) {
    if (it.category === cat.name) it.category = null;
  }
  for (const h of state.history) if (h.category === cat.name) h.category = null;
  await Promise.all([saveCategories(), saveShops(), saveHistory()]);
  render();
}
function moveCategory(from, to) {
  if (from === to || from < 0 || to < 0) return;
  const list = state.categories.slice();
  const [moved] = list.splice(from, 1);
  list.splice(to, 0, moved);
  state.categories = list;
  saveCategories().then(render);
}

      if (!shop) return;
      if (shop.items.some(i => i.isChecked) && confirm('Clear all checked items?')) clearChecked(shopId);
    })
  );
  wrap.appendChild(nav);

  const scroll = el('div', 'scroll');
  if (!shop || shop.items.length === 0) {
    scroll.appendChild(emptyState('🛒', 'No Items', 'Add items in the field below.'));
  } else {
    scroll.appendChild(itemsList(shop));
  }
  wrap.appendChild(scroll);

  // Suggestions + add bar
  const inputName = el('input', 'name');
  inputName.type = 'text'; inputName.placeholder = 'Add item…';
  let currentCategory = null;

  const sugWrap = el('div'); // suggestions container; replaced on input

  function refreshSuggestions() {
    const q = inputName.value.trim().toLowerCase();
    sugWrap.innerHTML = '';
    if (!q) return;
    const matches = state.history.filter(h => h.name.toLowerCase().includes(q)).slice(0, 6);
    if (matches.length === 0) return;
    const bar = el('div', 'suggestions');
    matches.forEach(h => {
      const chip = el('button', 'sugg-chip');
      if (h.photo) {
        const thumb = el('div', 'thumb');
        thumb.style.backgroundImage = `url(${dataURLFromBase64Jpeg(h.photo)})`;
        chip.appendChild(thumb);
      }
      chip.append(el('span', '', h.name), el('span', 'q', quantityDisplay(h.quantity)));
      chip.onclick = async () => {
        await addFromPrevious(shopId, h);
        inputName.value = ''; refreshSuggestions();
      };
      bar.appendChild(chip);
    });
    sugWrap.appendChild(bar);
  }
  inputName.addEventListener('input', refreshSuggestions);

  const catPick = el('label', 'cat-pick');
  const catSel = el('select');
  function rebuildCatOptions() {
    catSel.innerHTML = '';
    const o0 = el('option', '', `${UNCAT}  Uncategorised`);
    o0.value = ''; catSel.appendChild(o0);
    state.categories.forEach(c => {
      const o = el('option', '', `${ICONS[c.icon] || '·'}  ${c.name}`);
      o.value = c.name; catSel.appendChild(o);
    });
  }
  rebuildCatOptions();
  catSel.value = currentCategory || '';
  catSel.onchange = () => { currentCategory = catSel.value || null; };
  catPick.append(catSel);

  const plus = el('button', 'plus', '＋');
  plus.disabled = true;
  inputName.addEventListener('input', () => { plus.disabled = inputName.value.trim() === ''; });

  function commitNew() {
    const trimmed = inputName.value.trim();
    if (!trimmed) return;
    const prev = state.history.find(h => h.name.toLowerCase() === trimmed.toLowerCase());
    if (prev) {
      addFromPrevious(shopId, prev).then(() => { inputName.value = ''; refreshSuggestions(); plus.disabled = true; });
    } else {
      openItemEditor({
        mode: 'new', shopId,
        seed: { id: cryptoUUID(), name: trimmed, quantity: { amount: 1, unit: 'count' }, category: currentCategory, photo: null, isChecked: false }
      }).then(() => { inputName.value = ''; refreshSuggestions(); plus.disabled = true; });
    }
  }
  inputName.addEventListener('keydown', (e) => { if (e.key === 'Enter') commitNew(); });
  plus.onclick = commitNew;

  const addbar = el('div', 'addbar');
  addbar.append(inputName, catPick, plus);

  wrap.appendChild(sugWrap);
  wrap.appendChild(addbar);
  return wrap;
}

function itemsList(shop) {
  const list = el('div', 'group-list');
  const unchecked = shop.items.filter(i => !i.isChecked);
  const checked = shop.items.filter(i => i.isChecked);

  const grouped = {};
  for (const it of unchecked) {
    const k = it.category || '__uncat__';
    (grouped[k] ||= []).push(it);
  }
  const knownNames = new Set(state.categories.map(c => c.name));

  const sections = [];
  for (const cat of state.categories) {
    if (grouped[cat.name]) sections.push({ title: cat.name, icon: ICONS[cat.icon] || '', items: grouped[cat.name] });
  }
  for (const k of Object.keys(grouped)) {
    if (k === '__uncat__' || knownNames.has(k)) continue;
    sections.push({ title: k, icon: '', items: grouped[k] });
  }
  if (grouped['__uncat__']) sections.push({ title: UNCAT, icon: '', items: grouped['__uncat__'] });
  if (checked.length > 0) sections.push({ title: 'Found', icon: '✅', items: checked, foundSection: true });

  for (const sec of sections) {
    list.appendChild(el('div', 'section-title', sec.icon ? `${sec.icon} ${sec.title}` : sec.title));
    const card = el('div', 'section-card');
    for (const it of sec.items) card.appendChild(itemRow(shop, it));
    list.appendChild(card);
  }
  return list;
}

function itemRow(shop, item) {
  const row = el('div', 'row item-row');
  if (item.isChecked) row.classList.add('checked');

  const check = el('button', 'check', item.isChecked ? '✓' : '');
  if (item.isChecked) check.classList.add('on');
  check.onclick = (e) => { e.stopPropagation(); toggleItem(shop.id, item.id); };
  row.appendChild(check);

  if (item.photo) {
    const thumb = el('div', 'thumb');
    thumb.style.backgroundImage = `url(${dataURLFromBase64Jpeg(item.photo)})`;
    thumb.onclick = (e) => { e.stopPropagation(); openPhotoViewer(item.photo); };
    row.appendChild(thumb);
  }

  const name = el('div', 'name', item.name);
  name.onclick = () => openItemEditor({ mode: 'edit', shopId: shop.id, seed: { ...item } });
  row.appendChild(name);

  row.appendChild(el('span', 'qty', quantityDisplay(item.quantity)));

  addLongPressOrSwipeDelete(row, () => {
    if (confirm(`Delete "${item.name}"?`)) deleteItem(shop.id, item.id);
  });
  return row;
}

// ---- Item editor ----
function openItemEditor({ mode, shopId, seed }) {
  return new Promise((resolve) => {
    let name = seed.name;
    let amount = seed.quantity.amount;
    let unit = seed.quantity.unit;
    let category = seed.category;
    let photo = seed.photo;

    const backdrop = el('div', 'modal-backdrop');
    const m = el('div', 'modal');

    const nav = el('div', 'nav');
    nav.append(
      button('', 'Cancel', () => { backdrop.remove(); closeModal(); resolve(false); }),
      el('div', 'nav-title', mode === 'new' ? 'New Item' : 'Edit Item'),
      button('', 'Save', save)
    );
    m.appendChild(nav);

    const form = el('div', 'form');

    // Name
    const sName = el('div', 'form-section');
    sName.appendChild(el('h3', '', 'Name'));
    const inputName = el('input', '', '');
    inputName.type = 'text'; inputName.value = name;
    inputName.addEventListener('input', () => { name = inputName.value; });
    sName.appendChild(wrapRow(inputName));

    // Quantity
    const sQty = el('div', 'form-section');
    sQty.appendChild(el('h3', '', 'Quantity'));
    const amountInput = el('input');
    amountInput.type = 'number'; amountInput.step = 'any'; amountInput.value = amount;
    amountInput.addEventListener('input', () => { amount = parseFloat(amountInput.value); });
    const seg = el('div', 'seg');
    ['count', 'gram', 'kilo'].forEach(u => {
      const b = el('button', '', UNIT_SYMBOL[u]);
      if (u === unit) b.classList.add('on');
      b.onclick = () => { unit = u; refreshSeg(); };
      seg.appendChild(b);
    });
    function refreshSeg() { [...seg.children].forEach((b, i) => b.classList.toggle('on', ['count','gram','kilo'][i] === unit)); }
    sQty.appendChild(wrapRow(amountInput, seg));

    // Category
    const sCat = el('div', 'form-section');
    sCat.appendChild(el('h3', '', 'Category'));
    const catSel = el('select');
    const o0 = el('option', '', UNCAT); o0.value = ''; catSel.appendChild(o0);
    state.categories.forEach(c => {
      const o = el('option', '', `${ICONS[c.icon] || '·'}  ${c.name}`);
      o.value = c.name; catSel.appendChild(o);
    });
    catSel.value = category || '';
    catSel.onchange = () => { category = catSel.value || null; };
    sCat.appendChild(wrapRow(catSel));

    // Photo
    const sPhoto = el('div', 'form-section');
    sPhoto.appendChild(el('h3', '', 'Photo'));
    const preview = el('div', 'preview', photo ? '' : '📷');
    if (photo) preview.style.backgroundImage = `url(${dataURLFromBase64Jpeg(photo)})`;
    const pick = el('input'); pick.type = 'file'; pick.accept = 'image/*'; pick.style.display = 'none';
    pick.onchange = async () => {
      const f = pick.files?.[0]; if (!f) return;
      photo = await resizeImageToBase64(f);
      preview.style.backgroundImage = `url(${dataURLFromBase64Jpeg(photo)})`;
      preview.textContent = '';
      removeBtn.style.display = 'inline';
    };
    const pickBtn = el('button', 'link', photo ? 'Replace photo' : 'Pick photo');
    pickBtn.onclick = () => pick.click();
    const removeBtn = el('button', 'danger-link', 'Remove');
    removeBtn.style.display = photo ? 'inline' : 'none';
    removeBtn.onclick = () => {
      photo = null;
      preview.style.backgroundImage = '';
      preview.textContent = '📷';
      removeBtn.style.display = 'none';
      pickBtn.textContent = 'Pick photo';
    };
    const photoRow = el('div', 'form-row');
    const buttons = el('div'); buttons.style.display = 'flex'; buttons.style.flexDirection = 'column'; buttons.style.gap = '4px';
    buttons.append(pickBtn, removeBtn, pick);
    photoRow.append(el('div', 'photo-pick', preview, buttons));
    sPhoto.appendChild(photoRow);

    form.append(sName, sQty, sCat, sPhoto);
    m.appendChild(form);

    backdrop.appendChild(m);
    backdrop.onclick = (e) => { if (e.target === backdrop) { backdrop.remove(); closeModal(); resolve(false); } };
    openModal(backdrop);

    async function save() {
      const trimmed = name.trim();
      if (!trimmed) return;
      if (!(amount > 0)) return;
      const item = {
        id: seed.id,
        name: trimmed,
        quantity: { amount, unit },
        category,
        photo,
        isChecked: seed.isChecked || false
      };
      if (mode === 'new') await addItem(shopId, item);
      else await updateItem(shopId, item);
      backdrop.remove(); closeModal(); resolve(true);
    }
  });
}

// ---- Previous items modal ----
function openHistoryModal(shopId) {
  const backdrop = el('div', 'modal-backdrop');
  const m = el('div', 'modal'); m.style.height = '92vh';

  let filter = 'all'; // 'all', `cat:<name>`, 'uncat'

  const nav = el('div', 'nav');
  nav.append(
    el('div', 'ghost'),
    el('div', 'nav-title', 'Previous Items'),
    button('', 'Done', close)
  );
  m.appendChild(nav);

  const filterRow = el('div', 'hist-filter-row');
  const grid = el('div', 'hist-grid');

  const scroll = el('div', 'scroll'); scroll.style.padding = '0';
  scroll.append(filterRow, grid);
  m.appendChild(scroll);

  function rebuild() {
    const shop = shopById(shopId);
    const addedNames = new Set((shop?.items || []).map(i => i.name.toLowerCase()));
    const usedNames = new Set(state.history.map(h => h.category).filter(Boolean));
    const hasUncat = state.history.some(h => !h.category);

    filterRow.innerHTML = '';
    state.categories.filter(c => usedNames.has(c.name)).forEach(c => {
      const chip = el('button', 'hist-chip', ICONS[c.icon] || c.name[0]);
      if (filter === `cat:${c.name}`) chip.classList.add('on');
      chip.onclick = () => { filter = filter === `cat:${c.name}` ? 'all' : `cat:${c.name}`; rebuild(); };
      filterRow.appendChild(chip);
    });
    if (hasUncat) {
      const chip = el('button', 'hist-chip', UNCAT);
      if (filter === 'uncat') chip.classList.add('on');
      chip.onclick = () => { filter = filter === 'uncat' ? 'all' : 'uncat'; rebuild(); };
      filterRow.appendChild(chip);
    }

    grid.innerHTML = '';
    let items = state.history;
    if (filter.startsWith('cat:')) items = items.filter(h => h.category === filter.slice(4));
    else if (filter === 'uncat') items = items.filter(h => !h.category);

    if (items.length === 0) {
      grid.appendChild(el('div', 'empty', el('div', 'e-icon', '📭'), el('div', '', 'Nothing here')));
      return;
    }
    items.forEach(h => {
      const added = addedNames.has(h.name.toLowerCase());
      const cell = el('div', 'hist-cell ' + (added ? 'added' : 'available'));
      cell.append(
        el('div', 'h-name', h.name),
        el('div', 'h-qty', quantityDisplay(h.quantity))
      );
      if (!added) cell.onclick = async () => {
        await addFromPrevious(shopId, h);
        rebuild();
      };
      grid.appendChild(cell);
    });
  }
  rebuild();
  backdrop.appendChild(m);
  backdrop.onclick = (e) => { if (e.target === backdrop) close(); };
  openModal(backdrop);
  function close() { backdrop.remove(); closeModal(); }
}

  function close() { backdrop.remove(); closeModal(); }
  async function save() {
    if (!name.trim()) return;
    if (mode === 'new') await addCategory(name, icon);
    else await updateCategory(category, name, icon);
    close();
  }
}

// ---- Photo viewer ----
function openPhotoViewer(base64) {
  const backdrop = el('div', 'modal-backdrop');
  backdrop.style.background = 'rgba(0,0,0,0.92)';
  const img = el('img');
  img.src = dataURLFromBase64Jpeg(base64);
  img.style.maxWidth = '100%'; img.style.maxHeight = '100%'; img.style.objectFit = 'contain';
  backdrop.appendChild(img);
  backdrop.onclick = () => { backdrop.remove(); closeModal(); };
  openModal(backdrop);
}

// =====================================================================
// Small helpers
// =====================================================================
function el(tag, cls, ...kids) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  for (const k of kids) {
    if (k == null) continue;
    if (typeof k === 'string') e.appendChild(document.createTextNode(k));
    else e.appendChild(k);
  }
  return e;
}
function button(cls, text, onclick) {
  const b = el('button', cls, text);
  b.type = 'button';
  if (onclick) b.onclick = onclick;
  return b;
}
function wrapRow(...kids) {
  const r = el('div', 'form-row');
  for (const k of kids) r.appendChild(k);
  return r;
}
function emptyState(icon, title, msg) {
  return el('div', 'empty',
    el('div', 'e-icon', icon),
    el('div', '', el('strong', '', title)),
    el('div', 'muted', msg)
  );
}

// Long-press to delete (basic). Touch + mouse.
function addLongPressOrSwipeDelete(row, action) {
  let timer = null;
  function start(e) {
    timer = setTimeout(() => {
      timer = null;
      action();
    }, 650);
  }
  function cancel() {
    if (timer) { clearTimeout(timer); timer = null; }
  }
  row.addEventListener('touchstart', start, { passive: true });
  row.addEventListener('touchend', cancel);
  row.addEventListener('touchmove', cancel);
  row.addEventListener('mousedown', start);
  row.addEventListener('mouseup', cancel);
  row.addEventListener('mouseleave', cancel);
}

// =====================================================================
// Boot
// =====================================================================
(async function boot() {
  try {
    const url = new URL(window.location.href);
    const code = url.searchParams.get('code');
    if (code) {
      try {
        state.loading = true; render();
        await exchangeAuthCode(code);
        // Clean code out of URL
        url.searchParams.delete('code');
        url.searchParams.delete('state');
        window.history.replaceState({}, '', url.pathname + (url.search ? '?' + url.searchParams.toString() : ''));
      } catch (e) {
        state.error = e.message;
      } finally {
        state.loading = false;
      }
    }
    if (loadRefreshToken()) {
      state.view = 'shops';
      render();
      await loadAll();
    } else {
      state.view = 'signin';
      render();
    }
  } catch (e) {
    state.error = e.message; render();
  }
})();

})();
</script>
